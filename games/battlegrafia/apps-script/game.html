const STORAGE_KEY = "battlegrafia_player_pixel_historia_v6";

  // Compatibilidad: si existe un guardado antiguo en STORAGE_KEY, lo migra a una ranura.
  const STORAGE_SLOTS_KEY = "battlegrafia_save_slots_v1";
  const ACTIVE_SLOT_KEY   = "battlegrafia_active_slot_v1";

  /* ===========================
     GUARDADO EN LA NUBE (Google Apps Script)
     - Autenticación invisible (@fomento.edu)
     =========================== */
  let currentUser = null;
  let remoteSaveTimer = null;


// --- FUNCIONES DE CONEXIÓN CON EXCEL (ÚNICAS) ---

function isLenguArcadeEmbeddedMode(){
  return !!(window.__LENGUARCADE_EMBEDDED || window.__LENGUARCADE_SLOT_ID || window.__LENGUARCADE_PROFILE_KEY);
}

async function remoteSaveNow() {
  if(isLenguArcadeEmbeddedMode()) return false;
  if(localStorage.getItem('bg_is_demo') === 'true') return false; 
  if(!window.player) return false;
  
  const email = localStorage.getItem("bg_user_email") || "alumno@fomento.edu";
  const slot = typeof getRemoteSlotForMode === "function" ? getRemoteSlotForMode() : "main_adventure";
  
  // Limpieza de seguridad para el inventario
  window.player.items = window.player.items || [];
  
  const datosStr = JSON.stringify(window.player);
  const fecha = new Date().toLocaleString("es-ES");

  console.log("Guardando progreso e inventario de:", email);

  return new Promise((resolve) => {
    google.script.run
      .withSuccessHandler((respuesta) => {
        console.log("Servidor responde:", respuesta);
        resolve(respuesta);
      })
      .guardarProgreso(email, slot, window.player.gold || 0, window.player.level || 1, window.player.xp || 0, datosStr, fecha);
  });
}

async function remoteLoad() {
  if(isLenguArcadeEmbeddedMode()) return null;
  const email = localStorage.getItem("bg_user_email") || "alumno_incognito@fomento.edu";
  const slot = getRemoteSlotForMode();

  return new Promise((resolve, reject) => {
    // Pedimos al Excel el progreso del modo
    google.script.run
      .withSuccessHandler((modeJson) => {
        if (!modeJson) { resolve(null); return; }

        // Si hay datos del modo, ahora pedimos los datos GLOBALES (Oro e Inventario)
        google.script.run
          .withSuccessHandler((globalJson) => {
            let playerObj = JSON.parse(modeJson);
            
            if (globalJson) {
              const globalStats = JSON.parse(globalJson);
              // ¡MAGIA! Sobrescribimos el oro y objetos del modo con los globales
              playerObj.gold = globalStats.gold;
              playerObj.items = globalStats.items;
              playerObj.level = globalStats.level;
              playerObj.xp = globalStats.xp;
              console.log("Sincronización global completada: Oro y Objetos recuperados.");
            }
            
            resolve(playerObj);
          })
          .cargarProgreso(email, "PERFIL_GLOBAL");
      })
      .withFailureHandler(err => reject(err))
      .cargarProgreso(email, slot);
  });
}

// NUEVO INICIO: IDENTIFICACIÓN ROBUSTA
function inicializarUsuarioGAS() {
  if(isLenguArcadeEmbeddedMode()) return;
  // Buscamos si el alumno ya introdujo su nombre antes
  let email = localStorage.getItem("bg_user_email");
  
  // Si es la primera vez, le preguntamos con una ventana emergente nativa
  if (!email || email === "Desconocido") {
      email = prompt("🛡️ GUARDIANES DE LA PLUMA 🛡️\n\nPor favor, introduce tu código o nombre de alumno.\n(Servirá para guardar tu partida en la nube de tu profesor):");
      
      // Si le da a cancelar, le ponemos un nombre temporal
      if (!email || email.trim() === "") email = "Alumno_" + Math.floor(Math.random()*10000);
      
      localStorage.setItem("bg_user_email", email.trim());
  }
  
  currentUser = { id: email.trim(), email: email.trim() };
  window.BG_SESSION = { loggedIn: true, email: email.trim() };
  
  // Pintamos el nombre en el menú de "Cuenta" si existe
  const emailDisplay = document.getElementById('hub-account-email');
  if(emailDisplay) emailDisplay.textContent = email;

  // 2. CARGA INSTANTÁNEA LOCAL
  try {
    const rawSlots = localStorage.getItem("battlegrafia_save_slots_v1_adventure");
    let activeSlot = localStorage.getItem("battlegrafia_active_slot_v1_adventure");

    if (!activeSlot || activeSlot === "null") {
      activeSlot = "slot_1";
      localStorage.setItem("battlegrafia_active_slot_v1_adventure", activeSlot);
    }

    if (rawSlots) {
      const slots = JSON.parse(rawSlots);
      let activeData = slots.find(s => s && s.id === activeSlot);
      if (!activeData && slots.length > 0) activeData = slots[0];

      if (activeData && activeData.data) {
         // ¡EL ARREGLO ESTÁ AQUÍ! Ahora el motor del juego SÍ reconoce al héroe
         player = activeData.data; 
         window.player = player;
         window.BG = window.BG || {};
         window.BG.getPlayer = function() { return player; };

         actualizarMochilaHub();
         refrescarPantallasSecundarias();
      }
    }
  } catch(e) { console.warn("No hay partida local previa."); }

  // 3. CARGA EN SEGUNDO PLANO (Google Sheets)
  remoteLoad().then(cloudPlayer => {
     if(cloudPlayer) {
        player = cloudPlayer; 
        window.player = player;
        window.BG = window.BG || {};
        window.BG.getPlayer = function() { return player; };
      try {
         const rawSlots = localStorage.getItem("battlegrafia_save_slots_v1_adventure");
         let slots = rawSlots ? JSON.parse(rawSlots) : [];
         let activeSlot = localStorage.getItem("battlegrafia_active_slot_v1_adventure") || "slot_1";

         let slotIndex = slots.findIndex(s => s && s.id === activeSlot);
         if (slotIndex >= 0) {
            slots[slotIndex].data = cloudPlayer;
         } else {
            slots.push({ id: activeSlot, data: cloudPlayer, updatedAt: Date.now() });
            localStorage.setItem("battlegrafia_active_slot_v1_adventure", activeSlot);
         }
         const originalSetItem = localStorage.setItem;
         localStorage.setItem = function(k,v){ originalSetItem.apply(this,arguments); };
         localStorage.setItem("battlegrafia_save_slots_v1_adventure", JSON.stringify(slots));
         restaurarIntercepcionLocal();
      } catch(e) {}

      actualizarMochilaHub();
      refrescarPantallasSecundarias();
    }
  });
}

// Función encargada de pintar el oro, nivel y la lista de objetos
function actualizarMochilaHub() {
  const backpack = document.getElementById('hub-backpack');
  if(!backpack || !window.player) return;
  
  const oro = window.player.gold || 0;
  const nivel = window.player.level || 1;
  const nombre = window.player.name || "Héroe";
  const items = window.player.items || [];
  
  // Generamos el HTML para los objetos
  let itemsHTML = '';
  if (items.length === 0) {
    itemsHTML = '<span style="color: #9ca3af; font-size: 0.9rem; font-style: italic;">Mochila vacía</span>';
  } else {
    // Recorremos los objetos y creamos una "etiqueta" visual para cada uno
    itemsHTML = items.map(item => {
      // Por si el objeto es un texto ("pocion_vida") o un objeto complejo
      let itemName = typeof item === 'string' ? item : (item.name || item.id || 'Objeto misterioso');
      // Limpiamos barras bajas por espacios para que se lea mejor
      itemName = itemName.replace(/_/g, ' '); 
      return `<span style="background: rgba(167, 139, 250, 0.15); border: 1px solid rgba(167, 139, 250, 0.4); color: #e5e7eb; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; text-transform: capitalize; white-space: nowrap;">📦 ${itemName}</span>`;
    }).join('');
  }
  
  backpack.innerHTML = `
    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 15px; background: rgba(0,0,0,0.4); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;">
      <div style="font-size: 0.95rem; color: #d1d5db; letter-spacing: 0.5px;">${nombre} · Nivel ${nivel}</div>
      
      <div style="margin: 4px 0;">
        <span style="color: #fbbf24; font-weight: bold; font-size: 1.2rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">💰 ${oro} Oro</span>
      </div>
      
      <div style="width: 100%; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 8px; padding-top: 12px; display: flex; flex-direction: column; align-items: center;">
        <div style="font-size: 0.8rem; color: #a78bfa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold;">Tu Inventario</div>
        <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
          ${itemsHTML}
        </div>
      </div>
    </div>
  `;
}

// Función para restaurar la intercepción de guardado
function restaurarIntercepcionLocal() {
  const originalSetItem = localStorage.setItem;
  localStorage.setItem = function(key, value) {
    originalSetItem.apply(this, arguments);
    if(key === "battlegrafia_save_slots_v1_adventure") {
      try {
        const slots = JSON.parse(value);
        const activeSlot = localStorage.getItem("battlegrafia_active_slot_v1_adventure");
        const activeData = slots.find(s => s && s.id === activeSlot);
        if(activeData && activeData.data) {
          // ¡EL ARREGLO AQUÍ TAMBIÉN!
          player = activeData.data; 
          window.player = player;
          actualizarMochilaHub();
          scheduleRemoteSave(); // Guarda en Sheets
        }
      } catch(e) {}
    }
  };
}

// Asegurarnos de que el interceptor se activa al arrancar
restaurarIntercepcionLocal();


  // --- Indicador de guardado ---
  function setSaveIndicator(state, msg=""){
    const el = document.getElementById("saveIndicator");
    if(!el) return;
    el.classList.remove("is-saving","is-saved","is-error");
    if(!state){ el.style.display = "none"; el.textContent=""; return; }
    el.style.display = "inline-block";
    if(state === "saving"){
      el.classList.add("is-saving");
      el.textContent = msg || "Guardando…";
    }else if(state === "saved"){
      el.classList.add("is-saved");
      el.textContent = msg || "Guardado ✓";
      // se oculta solo al cabo de un rato
      clearTimeout(el._hideT);
      el._hideT = setTimeout(()=>{ try{ setSaveIndicator(null); }catch(e){} }, 2200);
    }else if(state === "error"){
      el.classList.add("is-error");
      el.textContent = msg || "Error al guardar";
    }
  }

function showOfflineOverlay(show){
  const o = document.getElementById("offlineOverlay");
  if(!o) return;
  o.classList.toggle("is-open", !!show);
  o.setAttribute("aria-hidden", show ? "false" : "true");
}
function checkOnlineGate(){
  const online = (typeof navigator !== "undefined") ? navigator.onLine : true;
  // Mostramos aviso si estás offline, pero NO bloqueamos el juego.
  showOfflineOverlay(!online);
  return online;
}

function ensureEndOverlay(){
  let ov = document.getElementById("endOverlay");
  if(ov) return ov;

  ov = document.createElement("div");
  ov.id = "endOverlay";
  ov.className = "end-overlay";
  ov.setAttribute("aria-hidden","true");

  ov.innerHTML = `
    <div class="end-overlay-inner">
      <img id="endOverlayImg" class="end-overlay-img" alt="">
      <div id="endOverlayNote" class="end-overlay-note"></div>
      <div class="end-overlay-actions">
        <button id="endOverlayPrimary" class="primary">Menú principal</button>
        <button id="endOverlaySecondary" class="secondary">Continuar</button>
      </div>
    </div>
  `;

  document.body.appendChild(ov);
  ov.addEventListener("click", (e)=>{ e.stopPropagation(); });
  return ov;
}

function showEndOverlay(type, opts={}){
  const ov = ensureEndOverlay();
  const img = document.getElementById("endOverlayImg");
  const note = document.getElementById("endOverlayNote");
  const btnPrimary = document.getElementById("endOverlayPrimary");
  const btnSecondary = document.getElementById("endOverlaySecondary");

  if(img){
    img.src = assetSrc(ENDING_IMAGES[type] || "");
    img.alt = (type === "win") ? "Victoria" : "Derrota";
  }

  if(note){
    if(opts.noteHtml){
      note.innerHTML = opts.noteHtml;
      note.style.display = "block";
    }else if(opts.noteText){
      note.textContent = opts.noteText;
      note.style.display = "block";
    }else{
      note.innerHTML = "";
      note.style.display = "none";
    }
  }

  if(btnPrimary){
    btnPrimary.textContent = "Menú principal";
    btnPrimary.onclick = () => {
      hideEndOverlay();
      goToHubMainMenu();
    };
  }

  if(btnSecondary){
    if(opts.secondaryText){
      btnSecondary.style.display = "inline-block";
      btnSecondary.textContent = opts.secondaryText;
      btnSecondary.onclick = () => {
        hideEndOverlay();
        if(typeof opts.onSecondary === "function") opts.onSecondary();
      };
    }else{
      btnSecondary.style.display = "none";
      btnSecondary.onclick = null;
    }
  }

  ov.classList.add("is-open");
  ov.setAttribute("aria-hidden","false");

  if(opts.autoGoMenu){
    clearTimeout(ov._t);
    ov._t = setTimeout(()=>{
      try{ hideEndOverlay(); }catch(e){}
      try{ goToHubMainMenu(); }catch(e){}
    }, opts.autoGoMenuDelayMs || 1200);
  }
}

function hideEndOverlay(){
  const ov = document.getElementById("endOverlay");
  if(!ov) return;
  clearTimeout(ov._t);
  ov.classList.remove("is-open");
  ov.setAttribute("aria-hidden","true");
  try{
    const note = document.getElementById("endOverlayNote");
    if(note){ note.innerHTML = ""; note.style.display = "none"; }
  }catch(e){}
}

window.BG_SESSION = window.BG_SESSION || { loggedIn:false, email:null };

function isOnlineNow(){

function syncHubSession(session){
  if(isLenguArcadeEmbeddedMode()) return;
  const loggedIn = !!(session && session.user);
  const email = session?.user?.email || null;

  window.BG_SESSION.loggedIn = loggedIn;
  window.BG_SESSION.email = email;

  if(loggedIn){
    localStorage.setItem('bg_logged_in','1');
    if(email) localStorage.setItem('bg_user_email', email);
  }else{
    localStorage.removeItem('bg_logged_in');
    localStorage.removeItem('bg_user_email');
  }

  // Notifica al HUB (para refrescar pantallas como Cuenta al hacer logout/login)
  try{
    window.dispatchEvent(new CustomEvent('bg:auth', { detail: { loggedIn, email } }));
  }catch(e){}
}

// ¿Hay partida guardada por modo? (Aventura y Supervivencia deben ser independientes)
window.BG.hasSaveForMode = function(modeId){
  try{
    const raw = localStorage.getItem(`${STORAGE_SLOTS_KEY}_${modeId}`);
    const slots = raw ? JSON.parse(raw) : [];
    const requiredSlotId = window.__LENGUARCADE_SLOT_ID || "";
    if(requiredSlotId) return Array.isArray(slots) && slots.some(s => s && s.id === requiredSlotId && s.data);
    return Array.isArray(slots) && slots.length > 0;
  }catch(e){ return false; }
};
window.BG.listContinuableModes = function(){
  return ["adventure","survival"].filter(m=>window.BG.hasSaveForMode(m));
};


(function initHubSessionFromSb(){
  try{
    if(isLenguArcadeEmbeddedMode()) return;
    if(!sb || !sb.auth) return;
    sb.auth.getSession().then(({ data }) => syncHubSession(data?.session));
    sb.auth.onAuthStateChange((_event, session) => syncHubSession(session));
  }catch(e){
    // no rompemos
  }
})();

  function bindAuthUi(){
    const navAcc = document.getElementById("nav-account");
    const navTeach = document.getElementById("nav-teacher");
    const closeBtn = document.getElementById("authClose");
    const overlay = document.getElementById("authOverlay");
    const tabLogin = document.getElementById("tabLogin");
    const tabSignup = document.getElementById("tabSignup");
    const doLoginBtn = document.getElementById("authDoLogin");
    const doSignupBtn = document.getElementById("authDoSignup");
    const doLogoutBtn = document.getElementById("authDoLogout");

    if(navAcc){
      navAcc.addEventListener("click", ()=> openAuth());
    }
    if(navTeach){
      navTeach.addEventListener("click", ()=>{
        const p = document.getElementById("teacherPanel");
        if(p) p.style.display = (p.style.display === "none" || !p.style.display) ? "block" : "none";
      });
    }
    if(closeBtn) closeBtn.addEventListener("click", ()=> closeAuth());
    if(overlay){
      overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeAuth(); });
    }

    if(tabLogin) tabLogin.addEventListener("click", ()=>{ authView = "login"; renderAuthUi(); });
    if(tabSignup) tabSignup.addEventListener("click", ()=>{ authView = "signup"; renderAuthUi(); });

    if(doLoginBtn) doLoginBtn.addEventListener("click", ()=> doLogin());
    if(doSignupBtn) doSignupBtn.addEventListener("click", ()=> doSignup());
    if(doLogoutBtn) doLogoutBtn.addEventListener("click", ()=> doLogout());

    const pass = document.getElementById("authPass");
    if(pass){
      pass.addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){
          e.preventDefault();
          if(currentUser) return;
          if(authView === "signup") doSignup();
          else doLogin();
        }
      });
    }
  }

document.addEventListener("DOMContentLoaded", ()=>{

  async function refreshTeacherAllowed(){
    teacherAllowed = false;
    if(!sb || !currentUser) return false;
    // Vía recomendada: tabla battlegrafia_teachers con user_id
    try{
      const { data, error } = await sb
        .from('battlegrafia_teachers')
        .select('user_id')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if(!error && data && data.user_id) teacherAllowed = true;
    }catch(e){}
    return teacherAllowed;
  }

    const byEmail = email && TEACHER_EMAILS.map(x=>String(x).toLowerCase()).includes(email);
    return !!(teacherAllowed || byEmail);

 function scheduleRemoteSave() {

  remoteSaveTimer = setTimeout(() => {

  }, 2000);

  function renderAuthUi(){

    const doLogin = document.getElementById("authDoLogin");
    const doSignup = document.getElementById("authDoSignup");
    const doLogout = document.getElementById("authDoLogout");
    const teacherPanel = document.getElementById("teacherPanel");

      navAcc.textContent = "Cuenta";
      if(status) status.innerHTML = '<span class="bad">Cloud Save desactivado</span> (falta configurar Supabase).';

      if(doSignup) doSignup.disabled = true;

      const tabSignup = document.getElementById("tabSignup");

    const status = document.getElementById("authStatus");
    if(status) status.textContent = "Entrando...";
    try{
      const { error } = await sb.auth.signInWithPassword({ email, password });

      if(status) status.innerHTML = '<span class="good">¡Dentro!</span>';
      if(status) status.textContent = "Cargando progreso…";
      await proceedAfterAuth();

function storageKeyForMode(baseKey){
    // Aísla ranuras/slot activo por modo para que no se pisen entre sí
    return `${baseKey}_${getSelectedModeId()}`;
  }

  function getSaveSlots(){
    try{
      const raw = localStorage.getItem(storageKeyForMode(STORAGE_SLOTS_KEY));
      const slots = raw ? JSON.parse(raw) : [];
      if(!Array.isArray(slots)) return [];
      const requiredSlotId = window.__LENGUARCADE_SLOT_ID || "";
      return requiredSlotId ? slots.filter(s => s && s.id === requiredSlotId) : slots;
    }catch(e){ return []; }
  }
  function setSaveSlots(slots){
    try{ localStorage.setItem(storageKeyForMode(STORAGE_SLOTS_KEY), JSON.stringify(slots||[])); }catch(e){}
  }
  function hasLocalSaveForMode(modeId){
    try{
      const raw = localStorage.getItem(`${STORAGE_SLOTS_KEY}_${modeId}`);
      const slots = raw ? JSON.parse(raw) : [];
      const requiredSlotId = window.__LENGUARCADE_SLOT_ID || "";
      if(requiredSlotId) return Array.isArray(slots) && slots.some(s => s && s.id === requiredSlotId && s.data);
      if(Array.isArray(slots) && slots.length) return true;
      // fallback legacy per-mode key
      const legacy = localStorage.getItem(`${STORAGE_KEY}_${modeId}`);
      return !!legacy;
    }catch(e){ return false; }
  }

function getActiveSlotId(){
    try{ return localStorage.getItem(storageKeyForMode(ACTIVE_SLOT_KEY)) || null; }catch(e){ return null; }
  }
  function setActiveSlotId(id){
    try{ if(id) localStorage.setItem(storageKeyForMode(ACTIVE_SLOT_KEY), id); }catch(e){}
  }
  function makeSlotId(){
    try{ if(window.__LENGUARCADE_SLOT_ID) return window.__LENGUARCADE_SLOT_ID; }catch(e){}
    return "slot_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
  }
  function upsertSlot(slot){
    const slots = getSaveSlots();
    const i = slots.findIndex(s => s.id === slot.id);
    if(i>=0) slots[i] = slot; else slots.unshift(slot);
    slots.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
    setSaveSlots(slots);
    return slots;
  }
  function migrateLegacySaveIfNeeded(){
    try{ if(window.__LENGUARCADE_SLOT_ID) return; }catch(e){}
    // Importar el guardado legacy SOLO en Aventura (para no clonar progreso en otros modos)
    if(getSelectedModeId() !== "adventure") return;
    const slots = getSaveSlots();
    if(slots.length) return;
    try{
      const raw = localStorage.getItem(storageKeyForMode(STORAGE_KEY));
      if(!raw) return;
      const parsed = JSON.parse(raw);
      const id = makeSlotId();
      upsertSlot({ id, name: (parsed && parsed.name) ? parsed.name : "Partida", updatedAt: Date.now(), data: parsed });
      setActiveSlotId(id);
    }catch(e){}
  }

function assetSrc(relPath){
  // relPath debe ser EXACTAMENTE como lo referenciabas: "img/items/xxx.webp"
  return (window.ASSET_IMAGES && window.ASSET_IMAGES[relPath]) ? window.ASSET_IMAGES[relPath] : relPath;
}



/* === Parche Chromebook: reescribe automáticamente <img src="img/..."> a Data-URI si existe en assets-images.js ===
   - assets-images.js debe definir window.ASSET_IMAGES = { "img/...": "data:image/webp;base64,....", ... }
   - Esto evita que el navegador tenga que "pedir" las imágenes como archivos aparte.
*/
function applyAssetSrcToImg(img){
  try{
    if(!img) return;
    const raw = img.getAttribute("src") || "";
    if(!raw) return;

    // No tocar data/blob ya resueltos
    if(raw.startsWith("data:") || raw.startsWith("blob:")) return;

    const resolved = assetSrc(raw);

    // Si cambia, sustitúyelo
    if(resolved && resolved !== raw){
      img.setAttribute("src", resolved);
    }
  }catch(e){}
}

function hydrateAllImages(root=document){
  try{
    root.querySelectorAll("img").forEach(applyAssetSrcToImg);
  }catch(e){}
}

// Primera pasada
document.addEventListener("DOMContentLoaded", ()=> hydrateAllImages(document));

// Observa cambios (muchas imágenes se insertan con innerHTML durante el juego)
try{
  const obs = new MutationObserver((mutations)=>{
    for(const m of mutations){
      if(m.type === "childList"){
        m.addedNodes && m.addedNodes.forEach(node=>{
          if(node.nodeType !== 1) return; // ELEMENT_NODE
          if(node.tagName === "IMG") applyAssetSrcToImg(node);
          else hydrateAllImages(node);
        });
      }else if(m.type === "attributes" && m.target && m.target.tagName === "IMG" && m.attributeName === "src"){
        applyAssetSrcToImg(m.target);
      }
    }
  });
  obs.observe(document.documentElement, { childList:true, subtree:true, attributes:true, attributeFilter:["src"] });
}catch(e){}

  function svgDataUri(svg){
    return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
  }

  // Aplica un background (en una CSS var) probando varias rutas antes de caer al SVG.
  // Evita el "salto" a fondo vacío cuando faltan assets (p.ej., .webp en algunos dispositivos/hosting).
  
function setCssBgWithFallback(el, cssVarName, urlCandidates, svgDataUriFallback){
  // Estrategia ultra-segura para que NUNCA se vea un fondo vacío:
  // 1) Aplica inmediatamente el SVG fallback.
  // 2) Intenta cargar candidatos (webp/png...). En cuanto uno cargue, sustituye el SVG.
  return new Promise((resolve)=>{
    try{
      const applySvg = ()=>{
        el.style.setProperty(cssVarName, `url("${svgDataUriFallback}")`);
      };
      applySvg();

      let i = 0;
      const tryNext = ()=>{
        if(i >= (urlCandidates?.length || 0)) return resolve({ used: "svg" });
        const url = urlCandidates[i++];
        if(!url) return tryNext();
        const img = new Image();
        img.onload = ()=>{
          el.style.setProperty(cssVarName, `url("${url}")`);
          resolve({ used: url });
        };
        img.onerror = ()=>tryNext();
        img.src = url;
      };
      tryNext();
    }catch(e){
      el.style.setProperty(cssVarName, `url("${svgDataUriFallback}")`);
      resolve({ used: "svg" });
    }
  });
}

  function applyContentBankToMonsters(contentId){
    const id = (contentId || "ortografia").trim() || "ortografia";
    const banks = (window.BG_CONTENT_BANKS && typeof window.BG_CONTENT_BANKS === "object") ? window.BG_CONTENT_BANKS : {};

    // Banco elegido (si existe)
    const selectedBank = banks[id] || null;

    // Banco mix: combinar varios bancos en una vista (si el profe lo usa)
    const mixIds = ["ortografia","morfologia","literatura","sintaxis","semantica"];
    const getMixedPhrases = (monsterId) => {
      const out = [];
      mixIds.forEach(cid => {
        const b = banks[cid];
        if(b && b[monsterId] && Array.isArray(b[monsterId])) out.push(...b[monsterId]);
      });
      return out;
    };

    monsters.forEach(m => {
      let phrases = [];

      if(id === "mix"){
        phrases = getMixedPhrases(m.id);
      }else if(selectedBank && Array.isArray(selectedBank[m.id])){
        phrases = selectedBank[m.id];
      }

      // Fallbacks seguros
      if(!phrases || !phrases.length) phrases = PHRASE_BANK[m.id] || [];

      m.phrases = phrases;
    });
  }

  // Inicial: dejar el banco por defecto (luego se aplicará al elegir contenidos)
  try{ applyContentBankToMonsters(getActiveContentId()); }catch(e){
    monsters.forEach(m => { m.phrases = PHRASE_BANK[m.id] || []; });
  }

  function startPracticeFight(monsterId){
    const wrap = document.getElementById("practiceOverlay");

    if(!unlocked.length){ openPracticeSetup(); return; }

    let chosenId = monsterId;
    if(monsterId === "__random__"){
      const pick = unlocked[Math.floor(Math.random()*unlocked.length)];
      chosenId = pick.id;
    }

    const idx = monsters.findIndex(mm => mm.id === chosenId);
    if(idx < 0){
      // Si el catálogo y el array interno no coinciden, usamos el primero desbloqueado disponible
      const fallback = unlocked.find(u => monsters.some(mm => mm.id === u.id));

  function levenshtein(a,b){
    const matrix = [];
    const lenA = a.length;
    const lenB = b.length;
    if(lenA === 0) return lenB;
    if(lenB === 0) return lenA;
    for(let i=0;i<=lenB;i++){ matrix[i] = [i]; }
    for(let j=0;j<=lenA;j++){ matrix[0][j] = j; }
    for(let i=1;i<=lenB;i++){
      for(let j=1;j<=lenA;j++){
        if(b.charAt(i-1) === a.charAt(j-1)){
          matrix[i][j] = matrix[i-1][j-1];
        }else{
          matrix[i][j] = Math.min(
            matrix[i-1][j-1] + 1,
            matrix[i][j-1] + 1,
            matrix[i-1][j] + 1
          );
        }
      }
    }
    return matrix[lenB][lenA];
  }

  function downloadFile(filename, text, mime="text/plain;charset=utf-8"){
    try{
      const blob = new Blob([text], {type:mime});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 800);
    }catch(e){ alert("No se pudo exportar el archivo."); }
  }

  async function submitExportToSupabase(payload){
    // Envía una entrega a Supabase (una fila por entrega).
    // Requiere tabla: battlegrafia_submissions (user_id uuid, email text, build text, exported_at timestamptz, progress jsonb, payload jsonb)
    if(!sb || !currentUser) throw new Error('No hay sesión iniciada.');
    if(!checkOnlineGate()) throw new Error('Sin conexión');

    const row = {
      user_id: currentUser.id,
      email: (currentUser.email || ''),
      build: 'Battlegrafía v1.0',
      exported_at: new Date().toISOString(),
      progress: payload.progress || null,
      payload: payload
    };

    const { error } = await sb
      .from('battlegrafia_submissions')
      .insert(row);

    if(error) throw error;
    return true;
  }

  function loadSavedPlayerLocal(){
    try{
      migrateLegacySaveIfNeeded();

      let parsed = null;
      const requiredSlotId = window.__LENGUARCADE_SLOT_ID || "";

      // 1) Intentar ranura activa
      const slotId = getActiveSlotId();
      const slots = getSaveSlots();
      if(slotId){
        const slot = slots.find(s => s.id === slotId);
        if(slot && slot.data) parsed = slot.data;
      }
      if(!parsed && requiredSlotId){
        const slot = slots.find(s => s.id === requiredSlotId);
        if(slot && slot.data){
          parsed = slot.data;
          setActiveSlotId(requiredSlotId);
        }
      }

      // 2) Si no hay ranura activa válida, cargar la más reciente
      if(!parsed && slots.length && !requiredSlotId){
        const slot = slots[0];
        if(slot && slot.data){
          parsed = slot.data;
          setActiveSlotId(slot.id);
        }
      }

      // 3) Compatibilidad: guardado antiguo (si no hay ranuras)
      if(!parsed){
        if(requiredSlotId) return null;
        const raw = localStorage.getItem(storageKeyForMode(STORAGE_KEY));
        if(!raw) return null;
        parsed = JSON.parse(raw);
      }
      if(typeof parsed.maxHp === "undefined") parsed.maxHp = 100;
      if(typeof parsed.hp === "undefined") parsed.hp = parsed.maxHp;
      if(!Array.isArray(parsed.items)) parsed.items = [];
      if(!Array.isArray(parsed.cards)) parsed.cards = [];
      if(typeof parsed.monstersDefeated === "undefined") parsed.monstersDefeated = 0;
      if(typeof parsed.level === "undefined") parsed.level = 1;
      if(typeof parsed.xp === "undefined") parsed.xp = 0;
      if(typeof parsed.xpToNext === "undefined") parsed.xpToNext = 100;
      if(typeof parsed.gold === "undefined") parsed.gold = 0;
      if(!Array.isArray(parsed.defeatedMonsters)) parsed.defeatedMonsters = [];
      if(typeof parsed.storyIndex === "undefined") parsed.storyIndex = 0;
      if(typeof parsed.avatarId === "undefined") parsed.avatarId = "mago";
      if(typeof parsed.avatarEmoji === "undefined") parsed.avatarEmoji = AVATARS[parsed.avatarId]?.emoji || "🧙‍♂️";
      if(typeof parsed.currentMonsterIndex === "undefined") parsed.currentMonsterIndex = 0;
      if(!Array.isArray(parsed.diary)) parsed.diary = [];
      if(!Array.isArray(parsed.battleFeed)) parsed.battleFeed = [];
      if(typeof parsed.abilityCharge === "undefined") parsed.abilityCharge = 0;
      return parsed;
    }catch(e){
      console.warn("Error al cargar partida:", e);
      return null;
    }
  }

// La función de las pistas potentes (déjala fuera, tal cual)
function getStrongHintText(){
  const m = getMonsterAt(currentMonsterIndex);
  const rule = m?.rule ? `Regla: ${m.rule}` : "";
  const wrong = currentPhrase?.wrong || "";
  const correct = currentPhrase?.correct || "";
  if(!wrong || !correct || wrong === correct) return rule ? `${rule}` : "Pista potente: revisa con calma la regla del monstruo.";
  let masked = "";
  for(let i=0;i<correct.length;i++){
    const ch = correct[i];
    masked += /[A-Za-zÁÉÍÓÚÜÑáéíóúüñ]/.test(ch) ? "▢" : ch;
  }
  const diffs = [];
  const L = Math.max(wrong.length, correct.length);
  for(let i=0;i<L;i++){
    if((wrong[i]||"") !== (correct[i]||"")){
      diffs.push(i);
      if(diffs.length>=3) break;
    }
  }
  diffs.forEach(i=>{
    if(i>=0 && i<masked.length) masked = masked.substring(0,i) + correct[i] + masked.substring(i+1);
  });
  return `${rule}${rule ? " · " : ""}Pista potente: ${masked}`;
}

function applyBattleWorldBackground(worldId){
    if(!battleScreenEl) return;
    const id = worldId || "montanas";
    const w = getWorldById(id);

    // Guardar la imagen previa para la transición
    const prev = getComputedStyle(battleScreenEl).getPropertyValue("--battle-bg-image").trim();
    if(prev) battleScreenEl.style.setProperty("--battle-bg-prev-image", prev);

    // Fondo con fallback real (evita el "fondo vacío" cuando el .webp no existe)
    const svg = makeWorldBattleBgSvg(w);

    // ¡VACUNA APLICADA AQUÍ! Pasamos todo por getAssetUrl
    const webpA = window.BG.getAssetUrl(`backgrounds/battle_bg_${id}.webp`);
    const pngA  = window.BG.getAssetUrl(`backgrounds/battle_bg_${id}.png`);
    const webpB = window.BG.getAssetUrl(`backgrounds/battle_bg_${id}.webp`);
    const pngB  = window.BG.getAssetUrl(`backgrounds/battle_bg_${id}.png`);

    // Probamos webp -> png -> svg (siempre funciona)
    // IMPORTANTE: lanzamos la transición cuando el nuevo fondo ya está aplicado,
    // para evitar que se vea un "fondo vacío" durante el fade.
    setCssBgWithFallback(battleScreenEl, "--battle-bg-image", [webpA, pngA, webpB, pngB], svg).then(()=>{
      // Disparar transición
      battleScreenEl.classList.remove("world-transition");
      // reflow
      void battleScreenEl.offsetWidth;
      battleScreenEl.classList.add("world-transition");
      // FX según mundo
      setBattleFxForWorld(id);

      clearTimeout(applyBattleWorldBackground._t);
      applyBattleWorldBackground._t = setTimeout(()=>{
        battleScreenEl && battleScreenEl.classList.remove("world-transition");
      }, 950);
    });
  }

  
  /* ===========================
     Battle FX (viento / fuego)
     =========================== */
  const battleFxCanvas = document.getElementById("battle-fx");
  const battleFxCtx = battleFxCanvas ? battleFxCanvas.getContext("2d") : null;
  let battleFxMode = "none";
  let battleFxParticles = [];
  let battleFxRaf = null;

  function resizeBattleFx(){
    if(!battleFxCanvas || !battleScreenEl) return;
    const rect = battleScreenEl.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    battleFxCanvas.width = Math.floor(rect.width * dpr);
    battleFxCanvas.height = Math.floor(rect.height * dpr);
    battleFxCanvas.style.width = rect.width + "px";
    battleFxCanvas.style.height = rect.height + "px";
    if(battleFxCtx) battleFxCtx.setTransform(dpr,0,0,dpr,0,0);
  }

  function setBattleFxMode(mode){
    battleFxMode = mode || "none";
    if(!battleFxCanvas) return;

    if(battleFxMode === "none"){
      battleFxCanvas.classList.add("is-hidden");
      battleFxParticles = [];
      if(battleFxRaf){ cancelAnimationFrame(battleFxRaf); battleFxRaf = null; }
      return;
    }

    battleFxCanvas.classList.remove("is-hidden");
    resizeBattleFx();
    if(!battleFxRaf) battleFxRaf = requestAnimationFrame(tickBattleFx);
  }

  function seedBattleFx(){
    battleFxParticles = [];
    if(!battleFxCanvas || !battleFxCtx) return;

    const w = battleFxCanvas.clientWidth || battleScreenEl.clientWidth;
    const h = battleFxCanvas.clientHeight || battleScreenEl.clientHeight;

    if(battleFxMode === "wind"){
      // rachas diagonales
      const n = 120;
      for(let i=0;i<n;i++){
        battleFxParticles.push({
          x: Math.random()*w,
          y: Math.random()*h,
          vx: 380 + Math.random()*260,
          vy: 120 + Math.random()*120,
          len: 18 + Math.random()*28,
          a: 0.10 + Math.random()*0.18,
          w: 1 + Math.random()*0.8
        });
      }
    }else if(battleFxMode === "fire"){
      // brasas ascendentes
      const n = 140;
      for(let i=0;i<n;i++){
        battleFxParticles.push({
          x: Math.random()*w,
          y: h + Math.random()*h*0.6,
          vx: -30 + Math.random()*60,
          vy: -120 - Math.random()*180,
          r: 1 + Math.random()*2.2,
          a: 0.15 + Math.random()*0.30,
          life: 0.6 + Math.random()*1.2
        });
      }
    }
  }

  let _battleFxLast = null;
  function tickBattleFx(t){
    if(!battleFxCanvas || !battleFxCtx){ battleFxRaf = null; return; }
    if(battleFxMode === "none"){ battleFxRaf = null; return; }

    const w = battleFxCanvas.clientWidth || battleScreenEl.clientWidth;
    const h = battleFxCanvas.clientHeight || battleScreenEl.clientHeight;

    if(!_battleFxLast) _battleFxLast = t;
    const dt = Math.min(0.033, (t - _battleFxLast)/1000);
    _battleFxLast = t;

    battleFxCtx.clearRect(0,0,w,h);

    if(battleFxMode === "wind"){
      // ligera neblina
      battleFxCtx.globalCompositeOperation = "source-over";
      battleFxCtx.fillStyle = "rgba(255,255,255,0.03)";
      battleFxCtx.fillRect(0,0,w,h);

      battleFxCtx.globalCompositeOperation = "screen";
      battleFxCtx.lineCap = "round";

      for(const p of battleFxParticles){
        p.x += p.vx*dt;
        p.y += p.vy*dt;

        // reinicio cuando salen
        if(p.x - p.len > w || p.y - p.len > h){
          p.x = -40 - Math.random()*120;
          p.y = Math.random()*h*0.65;
        }

        const x2 = p.x - p.len;
        const y2 = p.y - p.len*0.35;

        battleFxCtx.strokeStyle = `rgba(210,230,255,${p.a})`;
        battleFxCtx.lineWidth = p.w;
        battleFxCtx.beginPath();
        battleFxCtx.moveTo(p.x, p.y);
        battleFxCtx.lineTo(x2, y2);
        battleFxCtx.stroke();
      }
    } else if(battleFxMode === "fire"){
      // glow suave
      battleFxCtx.globalCompositeOperation = "source-over";
      battleFxCtx.fillStyle = "rgba(255,120,0,0.03)";
      battleFxCtx.fillRect(0,0,w,h);

      battleFxCtx.globalCompositeOperation = "lighter";

      for(const p of battleFxParticles){
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        p.life -= dt;

        // turbulencia leve
        p.vx += (-25 + Math.random()*50) * dt;
        p.vx = Math.max(-90, Math.min(90, p.vx));

        // respawn
        if(p.y < -20 || p.life <= 0){
          p.x = Math.random()*w;
          p.y = h + 20 + Math.random()*h*0.4;
          p.vx = -35 + Math.random()*70;
          p.vy = -140 - Math.random()*220;
          p.r = 1 + Math.random()*2.6;
          p.a = 0.15 + Math.random()*0.35;
          p.life = 0.6 + Math.random()*1.2;
        }

        battleFxCtx.beginPath();
        battleFxCtx.fillStyle = `rgba(255,160,40,${p.a})`;
        battleFxCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        battleFxCtx.fill();
      }
    }

    battleFxRaf = requestAnimationFrame(tickBattleFx);
  }

  function setBattleFxForWorld(worldId){
    // Canvas FX (ya existentes)
    if(worldId === "acantilados") setBattleFxMode("wind");
    else if(worldId === "volcan") setBattleFxMode("fire"); // lava
    else setBattleFxMode("none");
    seedBattleFx();

    // FX DOM + FX en mapa (nuevo)
    // FX DOM solo en batalla (el mapa se gestiona en renderBigMap)
    try{ setDomFxForWorld(worldId, "battle"); }catch(e){}
  }

  /* =========================================================
     FX DOM (CIÉNAGA/CASTILLO) + FX CANVAS EN MAPA (ACANTILADOS/VOLCÁN)

  const battleFxDomEl = document.getElementById("battle-fx-dom");
  const getMapFxDomEl = ()=>document.getElementById("map-fx-dom");

  // Importante: el mapa puede "previsualizar" otros mundos. Para que esa
  // previsualización NO contamine la batalla, llevamos temporizadores separados.
  let domFxTimersBattle = [];
  let domFxTimersMap = [];

  function _clearTimerBucket(bucket){
    bucket.forEach(t=>{ try{ clearInterval(t); }catch(e){} try{ clearTimeout(t); }catch(e){} });
    bucket.length = 0;
  }

  function clearDomFx(target="both"){
    if(target === "battle" || target === "both"){
      _clearTimerBucket(domFxTimersBattle);
      if(battleFxDomEl) battleFxDomEl.innerHTML = "";
    }
    if(target === "map" || target === "both"){
      _clearTimerBucket(domFxTimersMap);
      const mapDom = getMapFxDomEl();
      if(mapDom) mapDom.innerHTML = "";

  function startSwampBubbles(layer, bucket){
    if(!layer) return;
    const t1 = setInterval(()=>spawnBubble(layer, bucket, 1.0), 240);
    const t2 = setInterval(()=>spawnBubble(layer, bucket, 0.7), 380);
    bucket.push(t1,t2);
  }

  function spawnBubble(layer, bucket, intensity=1){
    const b = document.createElement("div");
    b.className = "fx-bubble";
    const size = Math.round(8 + Math.random()*18);
    const x = Math.random()*100;
    const dur = (2.0 + Math.random()*2.4) / intensity;
    const h = 300 + Math.random()*520;
    b.style.setProperty("--size", size+"px");
    b.style.setProperty("--x", x+"%");
    b.style.setProperty("--dur", dur+"s");
    b.style.setProperty("--h", h+"px");
    b.style.opacity = (0.55 + Math.random()*0.4).toFixed(2);
    layer.appendChild(b);

    const popAt = dur*1000*(0.90 + Math.random()*0.08);
    const popT = setTimeout(()=>{
      try{
        const rect = b.getBoundingClientRect();
        const layerRect = layer.getBoundingClientRect();
        const pop = document.createElement("div");
        pop.className = "fx-pop";
        pop.style.left = (rect.left - layerRect.left + rect.width/2) + "px";
        pop.style.top  = (rect.top  - layerRect.top  + rect.height/2) + "px";
        layer.appendChild(pop);
        setTimeout(()=>pop.remove(), 520);
      }catch(e){}
    }, popAt);
    bucket.push(popT);

    b.addEventListener("animationend", ()=> b.remove(), { once:true });
  }

  function startCastleBats(layer, bucket){
    if(!layer) return;

    // ARRANQUE DIFERIDO para evitar ancho/alto = 0 (muy típico en iframes)
    const kick = setTimeout(()=>{
      spawnBatFlock(layer, bucket);
      const t = setInterval(()=>spawnBatFlock(layer, bucket), 900); // bandada cada 0,9s
      bucket.push(t);
    }, 300);
    bucket.push(kick);
  }

  function spawnBatFlock(layer, bucket){
    const count = 12 + Math.floor(Math.random()*11); // 12..22
    const doubleWave = true;
    for(let i=0;i<count;i++){
      const delay = i*70;
      const t = setTimeout(()=>spawnBat(layer), delay);
      bucket.push(t);
    }
    if(doubleWave){
      const extra = 6 + Math.floor(Math.random()*5); // 6..10
      const baseDelay = 260 + Math.random()*220;
      for(let j=0;j<extra;j++){
        const delay = baseDelay + j*75;
        const t = setTimeout(()=>spawnBat(layer), delay);
        bucket.push(t);
      }
    }
  }

  function spawnBat(layer){
    if(!layer) return;
    const bat = document.createElement("div");
    bat.className = "fx-bat-emoji";
    bat.textContent = "🦇";

    const y = (10 + Math.random()*55).toFixed(1) + "%";
    const fs = Math.round(56 + Math.random()*48) + "px";
    const dur = (3.2 + Math.random()*3.0).toFixed(1) + "s";
    const dy = Math.round(-50 + Math.random()*100) + "px";

    bat.style.setProperty("--y", y);
    bat.style.setProperty("--fs", fs);
    bat.style.setProperty("--dur", dur);
    bat.style.setProperty("--dy", dy);

    layer.appendChild(bat);
    bat.addEventListener("animationend", ()=> bat.remove(), { once:true });
  }

  function startCastleFog(layer){
    if(!layer) return;
    layer.innerHTML = "";

    // Nubes: movimiento evidente
    const N = 7;
    for(let i=0;i<N;i++){
      const c = document.createElement('div');
      c.className = 'fx-fog-cloud';

      const top = 6 + Math.random()*72;
      const w   = 55 + Math.random()*75;
      const h   = 16 + Math.random()*22;
      const op  = 0.10 + Math.random()*0.16;
      const dur = 12 + Math.random()*18;

      c.style.setProperty('--top', top.toFixed(1) + '%');
      c.style.setProperty('--w',   w.toFixed(1) + '%');
      c.style.setProperty('--h',   h.toFixed(1) + '%');
      c.style.setProperty('--op',  op.toFixed(2));
      c.style.setProperty('--dur', dur.toFixed(1) + 's');
      c.style.animationDelay = (-Math.random()*dur).toFixed(1) + 's';

      layer.appendChild(c);
    }
  }

  function setDomFxForWorld(worldId, target="both"){

  // ===== FX CANVAS EN MAPA (wind / fire-lava) =====
  let mapFxCanvas = null, mapFxCtx = null;

  function initMapFx(){

  function resizeMapFx(){
    if(!mapFxCanvas || !mapFxCtx) return;
    const rect = mapFxCanvas.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    mapFxCanvas.width  = Math.floor(rect.width  * dpr);
    mapFxCanvas.height = Math.floor(rect.height * dpr);
    mapFxCtx.setTransform(dpr,0,0,dpr,0,0);

  function setMapFxMode(mode){
    mapFxMode = mode || "none";
    if(!mapFxCanvas) return;

    const wasHidden = mapFxCanvas.classList.contains("is-hidden");
    if(mapFxMode === "none"){
      mapFxCanvas.classList.add("is-hidden");
      return;
    }

    mapFxCanvas.classList.remove("is-hidden");

    // Importante: si el canvas estaba oculto, su getBoundingClientRect() podía ser 0x0.
    // Al mostrarlo, re-dimensionamos en el siguiente frame para que los FX se vean.
    if(wasHidden){
      requestAnimationFrame(()=>{
        try{ resizeMapFx(); }catch(e){}
        try{ seedMapFx(); }catch(e){}
      });
    }
  }

  function seedMapFx(){
    if(!mapFxCanvas || !mapFxCtx) return;
    mapFxParticles = [];
    const rect = mapFxCanvas.getBoundingClientRect();
    const w = rect.width, h = rect.height;

    if(mapFxMode === "wind"){
      const n = Math.round(18 + w/55);
      for(let i=0;i<n;i++){
        mapFxParticles.push({
          x: Math.random()*w,
          y: Math.random()*h*0.70,
          vx: 170 + Math.random()*220,
          vy:  40 + Math.random()*90,
          len: 18 + Math.random()*32,
          a: 0.10 + Math.random()*0.18
        });
      }
    }else if(mapFxMode === "fire"){
      const n = Math.round(26 + w/50);
      for(let i=0;i<n;i++){
        mapFxParticles.push({
          x: Math.random()*w,
          y: h + Math.random()*h*0.25,
          vx: -20 + Math.random()*40,
          vy: -(120 + Math.random()*240),
          r: 1.2 + Math.random()*2.6,
          a: 0.16 + Math.random()*0.24,
          life: 0.7 + Math.random()*1.4
        });
      }
    }
  }

  function tickMapFx(ts){
    if(!mapFxCanvas || !mapFxCtx){ requestAnimationFrame(tickMapFx); return; }
    if(!mapFxLast) mapFxLast = ts;
    const dt = Math.min(0.05, (ts - mapFxLast)/1000);
    mapFxLast = ts;

    const rect = mapFxCanvas.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    mapFxCtx.clearRect(0,0,w,h);

    if(mapFxMode === "wind"){
      mapFxCtx.lineCap = "round";
      for(const p of mapFxParticles){
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        if(p.x - p.len > w || p.y - p.len > h){
          p.x = -40 - Math.random()*120;
          p.y = Math.random()*h*0.70;
        }
        const x2 = p.x - p.len;
        const y2 = p.y - p.len*0.35;
        mapFxCtx.strokeStyle = `rgba(210,230,255,${p.a})`;
        mapFxCtx.lineWidth = 2;
        mapFxCtx.beginPath();
        mapFxCtx.moveTo(p.x, p.y);
        mapFxCtx.lineTo(x2, y2);
        mapFxCtx.stroke();
      }
    }else if(mapFxMode === "fire"){
      // "lava": brillos + chispas subiendo
      // brillo inferior
      const g = mapFxCtx.createLinearGradient(0,h,0,h*0.65);
      g.addColorStop(0, "rgba(255,90,30,0.30)");
      g.addColorStop(1, "rgba(255,90,30,0.00)");
      mapFxCtx.fillStyle = g;
      mapFxCtx.fillRect(0,h*0.65,w,h*0.35);

      for(const p of mapFxParticles){
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        p.life -= dt;
        if(p.y < -20 || p.life <= 0){
          p.x = Math.random()*w;
          p.y = h + Math.random()*h*0.25;
          p.vx = -20 + Math.random()*40;
          p.vy = -(120 + Math.random()*240);
          p.r  = 1.2 + Math.random()*2.6;
          p.a  = 0.16 + Math.random()*0.24;
          p.life = 0.7 + Math.random()*1.4;
        }
        mapFxCtx.beginPath();
        mapFxCtx.fillStyle = `rgba(255,120,40,${p.a})`;
        mapFxCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        mapFxCtx.fill();
      }
    }

    requestAnimationFrame(tickMapFx);
  }

  function computeDiarySummary(diary){
    const d = diary || [];
    if (d.length === 0){
      return { total:0, perfect:0, imperfect:0, perfectPct:0, avgPlayerDamage:0, avgMonsterDamage:0, hardestByDamage:null, lastDate:null, contents:[], contentsText:"" };
    }
    const total = d.length;
    let perfect = 0;
    let sumPlayerDamage = 0;
    let sumMonsterDamage = 0;
    const contentsSet = new Set();
    const byMonster = {};
    d.forEach(entry => {
      if (entry.isPerfect) perfect++;
      sumPlayerDamage += entry.playerDamage || 0;
      sumMonsterDamage += entry.monsterDamage || 0;

      if(entry && entry.contentId) contentsSet.add(entry.contentId);

      const name = entry.monster || "Desconocido";
      if (!byMonster[name]) byMonster[name] = { count: 0, damageReceived: 0 };
      byMonster[name].count++;
      byMonster[name].damageReceived += entry.monsterDamage || 0;
    });
    const imperfect = total - perfect;
    const perfectPct = Math.round((perfect / total) * 100);
    const avgPlayerDamage = (sumPlayerDamage / total).toFixed(1);
    const avgMonsterDamage = (sumMonsterDamage / total).toFixed(1);

    let hardestByDamage = null;
    Object.entries(byMonster).forEach(([name, stats]) => {
      if (!hardestByDamage || stats.damageReceived > hardestByDamage.damageReceived){
        hardestByDamage = { monster: name, damageReceived: stats.damageReceived };
      }
    });

    const lastDate = d[d.length - 1].timestamp;
    const contents = Array.from(contentsSet);
    const contentsText = contents.length
      ? contents.map(id => getContentLabel(id)).join(", ")
      : getContentLabel(getActiveContentId());
    return { total, perfect, imperfect, perfectPct, avgPlayerDamage, avgMonsterDamage, hardestByDamage, lastDate, contents, contentsText };
  }

function buyShopItem(id){
  const showMsg = (html) => {
    try{ const hubMsg = document.getElementById('hub-shop-msg'); if(hubMsg){ hubMsg.innerHTML = html; return; } }catch(e){}
    try{ if(typeof campMessageEl !== 'undefined' && campMessageEl) { campMessageEl.innerHTML = html; return; } }catch(e){}
    try{ console.log(html.replace(new RegExp('<[^>]+>', 'g'),'')); }catch(e){}
  };

  if(runRules && !runRules.allowShop){ showMsg(`<span class="hint">En este modo no puedes comprar.</span>`); return; }
  if(window.BG?.isDemo && window.BG.isDemo()){ showMsg(`<span class="hint">Modo demo: inicia sesión para comprar.</span>`); return; }
  if(!isOnlineNow()){ showMsg(`<span class="hint">Sin conexión.</span>`); return; }

  const item = SHOP_ITEMS.find(x => x.id === id);
  if(!item) return;

  const goldNow = Number(player?.gold) || 0;
  if(goldNow < item.cost){
    showMsg(`<span class="bad">No tienes oro suficiente. Te faltan ${item.cost - goldNow}.</span>`);
    return;
  }

  player.gold = goldNow - item.cost;
  addItem(item.name);

  showMsg(`<span class="good">Has comprado <strong>${item.name}</strong>.</span>`);
  updateHpBars();
  updateHeroUi();
  savePlayer();

  try{ renderHubShop(); }catch(e){}
  try{ window.BG_UI?.renderHubBackpack?.(); }catch(e){}
  try{ renderShop?.(); }catch(e){}
}

function sellShopItem(id){
  const showMsg = (html) => {
    try{ const hubMsg = document.getElementById('hub-shop-msg'); if(hubMsg){ hubMsg.innerHTML = html; return; } }catch(e){}
    try{ if(typeof campMessageEl !== 'undefined' && campMessageEl) { campMessageEl.innerHTML = html; return; } }catch(e){}
  };

  if(runRules && !runRules.allowShop){ showMsg(`<span class="hint">En este modo no puedes vender.</span>`); return; }
  if(!isOnlineNow()){ showMsg(`<span class="hint">Sin conexión.</span>`); return; }

  const itemDef = SHOP_ITEMS.find(x => x.id === id);
  if(!itemDef) return;

  const itemIndex = player.items.indexOf(itemDef.name);
  if(itemIndex === -1){
    showMsg(`<span class="bad">No tienes este objeto.</span>`);
    return;
  }

  const sellPrice = Math.floor(itemDef.cost / 2);
  player.items.splice(itemIndex, 1);
  player.gold = (Number(player.gold) || 0) + sellPrice;

  showMsg(`<span class="good">Has vendido <strong>${itemDef.name}</strong> por ${sellPrice} de oro.</span>`);
  
  updateHpBars();
  updateHeroUi();
  savePlayer();

  try{ renderHubShop(); }catch(e){}
  try{ window.BG_UI?.renderHubBackpack?.(); }catch(e){}
  try{ renderShop?.(); }catch(e){}
}

  function pickNewPhrase(){
    const monster = getMonsterAt(currentMonsterIndex);
    const bank = monster.phrases;
    if(!bank || bank.length === 0){
      wrongPhraseEl.textContent = "El monstruo se ha quedado sin frases...";
      return;
    }
    if(!usedPhraseIndicesByMonster[monster.id]){
      usedPhraseIndicesByMonster[monster.id] = new Set();
    }
    const used = usedPhraseIndicesByMonster[monster.id];
    let available = [];
    for(let i=0;i<bank.length;i++){
      if(!used.has(i)) available.push(i);
    }
    if(available.length === 0){
      used.clear();
      available = bank.map((_,i)=>i);
    }
    const idx = available[Math.floor(Math.random()*available.length)];
    used.add(idx);
    currentPhrase = bank[idx];
    wrongPhraseEl.textContent = currentPhrase.wrong;
    answerEl.value = "";
    answerEl.focus();
  }

  function formatMMSS(ms){
    const s = Math.max(0, Math.floor(ms/1000));
    const mm = String(Math.floor(s/60)).padStart(2,"0");
    const ss = String(s%60).padStart(2,"0");
    return `${mm}:${ss}`;
  }

  function stopStrategyTimer(){
    try{
      if(runState && runState._strategyT){
        clearInterval(runState._strategyT);
        runState._strategyT = null;
      }
    }catch(e){}
    const el = document.getElementById("strategy-timer");
    if(el) el.textContent = "";
  }

  function handleStrategyTimeout(){
    if(!player) return;
    stopStrategyTimer();
    setLog(`<span class="bad">¡Tiempo!</span> No has logrado vencer a todos los monstruos a tiempo.`);
    showEndOverlay("lose", {
      secondaryText: "Reintentar",
      onSecondary: ()=>{ try{ retryStrategyRun(); }catch(e){} }
    });
  }

  function startStrategyTimer(){
    stopStrategyTimer();
    const el = ensureStrategyTimerEl();
    if(!el || !runState || !runState.endsAt) return;

    const tick = ()=>{
      if(!runState || !runState.endsAt) return;
      const left = runState.endsAt - Date.now();
      el.textContent = `⏱️ ${formatMMSS(left)}`;
      if(left <= 0){
        handleStrategyTimeout();
      }
    };
    tick();
    runState._strategyT = setInterval(tick, 250);
  }

        row.className = "strategy-item-row";
        row.innerHTML = `
          <div class="strategy-item-name">${name}</div>
          <div class="strategy-stepper">
            <button class="btn tiny" data-act="dec" ${picked<=0?"disabled":""}>−</button>
            <div class="strategy-qty">${picked} / ${have}</div>
            <button class="btn tiny" data-act="inc" ${picked>=have?"disabled":""}>+</button>
          </div>
        `;

        row.querySelectorAll("button").forEach(btn=>{
          btn.addEventListener("click", ()=>{
            const act = btn.getAttribute("data-act");
            const cur = state.itemCounts[name] || 0;
            if(act==="inc" && cur < have) state.itemCounts[name] = cur+1;
            if(act==="dec" && cur > 0) state.itemCounts[name] = cur-1;
            syncUI();
          });
        });

        itemsEl.appendChild(row);
      });
    }

    function syncUI(){
      state.minutes = Number(timeSel?.value || 3);
      state.need = timeToNeed(state.minutes);

      if(needEl) needEl.textContent = String(state.need);
      if(countEl) countEl.textContent = `${state.need} monstruos · ${state.minutes} min`;

      // Re-render monsters to enforce disabled states
      renderMonsters();
      renderItems();

      const ok = (unlocked.length>0) && (state.selectedMonsterIds.size === state.need);
      startBtn.disabled = !ok;

      if(unlocked.length===0){
        warnEl.textContent = "Desbloquea monstruos derrotándolos en Aventura.";
      }else if(state.selectedMonsterIds.size !== state.need){
        warnEl.textContent = `Selecciona exactamente ${state.need} monstruos.`;
      }else{
        warnEl.textContent = "Listo. ¡A por el reto!";
      }
    }

    timeSel.onchange = ()=>{ 
      // si cambiamos el tiempo, limpiamos selección para evitar inconsistencias
      state.selectedMonsterIds.clear();
      syncUI();
    };

    cancelBtn.onclick = ()=>{
      ov.classList.remove("is-open");
      goToHubMainMenu();
    };

    startBtn.onclick = ()=>{
      // Construir cola de monstruos elegidos
      const ids = Array.from(state.selectedMonsterIds);
      const selected = monsters.filter(m => ids.includes(m.id));
      if(selected.length !== state.need) return;

      // Guardar configuración para poder "Reintentar"
      runState.strategyConfig = {
        minutes: state.minutes,
        need: state.need,
        monsterIds: ids.slice(),
        itemCounts: JSON.parse(JSON.stringify(state.itemCounts||{}))
      };

      // Configurar run
      runState.endsAt = Date.now() + state.minutes*60*1000;
      runState.allowedItemCounts = {};
      runState.allowedItems = [];

      Object.entries(state.itemCounts).forEach(([name,qty])=>{
        const q = Number(qty)||0;
        if(q>0){
          runState.allowedItemCounts[name]=q;
          runState.allowedItems.push(name);
        }
      });

      // Guardamos la cola de monstruos del run (objetos)
      runState.strategyMonsterObjs = selected.slice();

      // Reinicio indices/HP
      currentMonsterIndex = 0;
      player.currentMonsterIndex = 0;
      currentMonsterHp = null;

      // Cargar primer monstruo y arrancar timer
      ov.classList.remove("is-open");
      loadMonsterStrategy(selected);
      startStrategyTimer();
    };

    syncUI();
    ov.classList.add("is-open");
  }

  function loadMonsterStrategy(selectedMonsters){
    // selectedMonsters: array de objetos monstruo
    if(!Array.isArray(selectedMonsters) || selectedMonsters.length===0){
      handleStrategyTimeout();
      return;
    }
    // Activamos pool de monstruos para este run
    runState.strategyMonsterObjs = selectedMonsters.slice();
    currentMonsterIndex = Math.max(0, Math.min(currentMonsterIndex, getMonstersLength()-1));
    loadMonster();
    updateHpBars();
    switchTo("battle");
  }

  function retryStrategyRun(){
    try{ stopStrategyTimer(); }catch(e){}
    if(!runState) runState = {};
    const cfg = runState.strategyConfig;
    if(!cfg || !Array.isArray(cfg.monsterIds) || !cfg.monsterIds.length){
      // Si no hay configuración, volvemos al setup
      try{ openStrategySetup(); }catch(e){}
      return;
    }

    const minutes = Number(cfg.minutes)||3;
    // Reconstruir selección de monstruos
    const selected = monsters.filter(m => cfg.monsterIds.includes(m.id));
    if(!selected.length){
      try{ openStrategySetup(); }catch(e){}
      return;
    }

    // Reconstruir loadout: limitado por inventario real ACTUAL
    runState.allowedItemCounts = {};
    runState.allowedItems = [];

    const inv = Array.isArray(player.items) ? player.items : [];
    const invCounts = {};
    for(const it of inv){ invCounts[it] = (invCounts[it]||0)+1; }

    const want = cfg.itemCounts || {};
    Object.entries(want).forEach(([name,qty])=>{
      const desired = Number(qty)||0;
      if(desired <= 0) return;
      const avail = Number(invCounts[name])||0;
      const q = Math.max(0, Math.min(desired, avail));
      if(q>0){
        runState.allowedItemCounts[name]=q;
        runState.allowedItems.push(name);
      }
    });

    // Configurar run
    runState.endsAt = Date.now() + minutes*60*1000;
    runState.strategyMonsterObjs = selected.slice();
    currentMonsterIndex = 0;
    player.currentMonsterIndex = 0;
    currentMonsterHp = null;
    player.hp = player.maxHp;

    loadMonsterStrategy(selected);
    startStrategyTimer();
  }

function endRunWinAll(){
    try{ if(runModeId==="strategy") stopStrategyTimer(); }catch(e){}
    setLog(`<span class="good">¡Victoria!</span> Has completado el modo actual. ¡Tu leyenda continúa!`);
    showEndOverlay("win", { secondaryText: null });
  }

  function loadMonster(){
    if(currentMonsterIndex >= getMonstersLength()){
      endRunWinAll();
      return;
    }

    let monster = getMonsterAt(currentMonsterIndex);

    if(player.defeatedMonsters.includes(monster.id)){
      currentMonsterIndex++;
      player.currentMonsterIndex = currentMonsterIndex;
      currentMonsterHp = 0;
      savePlayer();
      loadMonster();
      return;
    }

    monster = getMonsterAt(currentMonsterIndex);

    // Si vienes de "Continuar partida", mantenemos la vida restante del monstruo actual
    const savedHp = Number(player && player.currentMonsterHp);
    const savedId = player && player.currentMonsterId;

    if(savedId === monster.id && Number.isFinite(savedHp) && savedHp > 0 && savedHp <= monster.maxHp){
      currentMonsterHp = savedHp;
    }else{
      currentMonsterHp = monster.maxHp;
    }

    // Cambiar fondo según el mundo del monstruo actual
    applyBattleWorldBackground(getMonsterWorldId(currentMonsterIndex));

    resetBattleState();

    monsterNameEl.textContent = monster.name;
    monsterTypeEl.textContent = `${monster.type} · Dificultad: ${monster.difficulty}`;

    // Sprite con fallback (nuevo formato: img/monsters/<id>.webp)
    // Evita que reaparezca el monstruo anterior tras la desintegración
    monsterSpriteImg.style.visibility = "hidden";
    monsterSpriteImg.onload = function(){
      this.style.visibility = "visible";
      this.classList.add("spawn-in");
      setTimeout(()=>this.classList.remove("spawn-in"), 320);
    };
    const altSprite = window.BG.getAssetUrl(`monsters/${monster.id}.webp`);    
    const fallbackSprite = makeMonsterSprite(monster.name, monster.world);
    monsterSpriteImg.onerror = function(){
      if(this.src.indexOf(altSprite) === -1){ this.src = altSprite; return; }
      this.onerror = null; this.src = fallbackSprite;
    };
    monsterSpriteImg.src = monster.sprite || altSprite;
    monsterSpriteImg.alt = monster.name;

    updateHpBars();
    renderBigMap();
    pickNewPhrase();

    setLog(`Nuevo enemigo: <strong>${monster.name}</strong>. <span class="hint">Tipo de errores: ${monster.type} · Dificultad: ${monster.difficulty}</span>. Corrige sus frases para purificarlo.`);
  }

  function handleDefeat(){
    const monster = getMonsterAt(currentMonsterIndex);

    // ===== Modo supervivencia: permadeath dentro del modo =====
    // Si mueres, vuelves al inicio del modo (sin campamento), pero guardamos récord de progreso.
    if(runModeId === "survival"){
      const monster = getMonsterAt(currentMonsterIndex);

      const reachedIdx = Number.isFinite(currentMonsterIndex) ? currentMonsterIndex : 0;
      const bestIdx = Number(player.survivalBestIndex) || 0;
      if(reachedIdx > bestIdx){
        player.survivalBestIndex = reachedIdx;
        player.survivalBestName  = monster?.name || "";
        player.survivalBestAt    = Date.now();
      }

      // Reset de progreso SOLO del modo supervivencia (no tocar oro/inventario global)
      currentMonsterIndex = 0;
      player.currentMonsterIndex = 0;
      currentMonsterHp = 0;
      player.hp = player.maxHp;
      resetBattleState();

      if(runRules && runRules.allowProgress) savePlayer();

      const bestLabel = (Number(player.survivalBestIndex) || 0) > 0
        ? `Récord: <strong>${player.survivalBestName || (getMonsterAt(player.survivalBestIndex)?.name || "")}</strong> (monstruo #${(player.survivalBestIndex||0)+1}).`
        : "Aún no tienes récord en Supervivencia.";

      setLog(
        `<span class="bad">Has caído en Supervivencia…</span><br><br>`+
        `<span class="hint">Tu progreso se reinicia a 0 en este modo.</span>`
      );

      // Mostrar derrota y esperar botón. Incluye el récord en el overlay.
      showEndOverlay("lose", {
        noteHtml: `${bestLabel}<br><span class="hint">Objetivo: llegar al último monstruo sin descansar ni usar objetos.</span>`
      });
      return;
    }

    // ===== Modo estrategia: derrota (sin auto menú) =====
    if(runModeId === "strategy"){
      stopStrategyTimer();
      setLog(`<span class="bad">Has fallado el reto de Estrategia.</span> Te quedaste sin vida.`);
      showEndOverlay("lose", {
        secondaryText: "Reintentar",
        onSecondary: ()=>{ try{ retryStrategyRun(); }catch(e){} }
      });
      return;
    }

    // Penalización v1.0: si mueres, pierdes TODO el oro y TODOS los objetos.
    const oldGold = Number(player.gold) || 0;
    const goldLost = oldGold;
    player.gold = 0;

    const itemsLost = Array.isArray(player.items) ? player.items.length : 0;
    player.items = [];

    // Mantengo una pequeña pérdida de EXP (progreso hacia el siguiente nivel)
    // para que la derrota tenga “peso”, pero sin bajarte de nivel.
    const xpLoss = Math.round((Number(player.xpToNext) || 0) * XP_DEATH_PENALTY_RATIO);
    const realXpLoss = Math.min(Number(player.xp) || 0, xpLoss);
    player.xp = (Number(player.xp) || 0) - realXpLoss;

    // Te despiertas con algo de vida (nunca 0)
    player.hp = Math.max(1, Math.round(player.maxHp * HP_AFTER_DEATH_RATIO));

    // Resetea combate actual
    currentMonsterHp = monster.maxHp;
    resetBattleState();


    // FIX: al morir se bloquean controles; al “continuar” deben reactivarse
    try{
      battleState.isDeathAnimating = false; // por si quedó enganchado
      unlockBattleControls();
      if(answerEl) answerEl.disabled = false; // extra defensivo
    }catch(e){}
    updateHeroUi();
    updateHpBars();
    savePlayer();

    setLog(`
      <span class="bad">Has sido derrotado por ${monster.name}...</span><br><br>
      Pierdes <strong>todo tu oro</strong> (<strong>-${goldLost}</strong>) y <strong>todos tus objetos</strong> (<strong>-${itemsLost}</strong>),
      y parte del progreso hacia el siguiente nivel (<strong>-${realXpLoss} EXP</strong>).<br><br>
      <span class="hint">Conservas tu nivel, tus cartas y los monstruos ya purificados. Te despiertas en el campamento… y esta vez prometes no ir tan confiado.</span>
    `);

    // Banner de derrota (puedes continuar la partida o volver al menú)
    try{
      showEndOverlay("lose", {
        secondaryText: "Continuar",
        onSecondary: ()=>{ /* seguir jugando */ }
      });
    }catch(e){}


    campMessageEl.innerHTML = `<span class="hint">Has sido derrotado por ${monster.name}. Has perdido todo el oro y todos los objetos, pero conservas tu nivel y tus cartas. Puedes descansar y volver a intentarlo.</span>`;
    switchTo("camp");
  }


// ===== FX: Desintegración del monstruo (canvas) =====
function disintegrateImg(imgEl, onDone, opts = {}) {
  try{
    const {
      duration = 950,        // ms
      step = 3,              // 1 = más partículas, 4 = menos (mejor para Chromebooks)
      spread = 85,           // dispersión
      gravity = 0.10,        // caída
      fade = true,
      keepHiddenAfter = false, // si true, NO vuelve a mostrar la imagen al terminar
      featherMask = true,      // difumina bordes del canvas (menos “cuadradote”)
      blurPx = 0.7             // blur suave del canvas (0 = none)
    } = opts;

    if(!imgEl) { onDone && onDone(); return; }
    const parent = imgEl.parentElement;
    if(!parent) { onDone && onDone(); return; }

    // Si la imagen no ha cargado aún, evitamos líos
    if(!imgEl.complete || imgEl.naturalWidth === 0){
      onDone && onDone();
      return;
    }

    // Canvas overlay en el mismo contenedor del sprite
    const canvas = document.createElement("canvas");
    const dpr = window.devicePixelRatio || 1;

    const w = Math.max(1, imgEl.offsetWidth);
    const h = Math.max(1, imgEl.offsetHeight);

    // Asegura overlay correcto
    const cs = getComputedStyle(parent);
    if(cs.position === "static") parent.style.position = "relative";

    canvas.style.position = "absolute";
    canvas.style.left = imgEl.offsetLeft + "px";
    canvas.style.top  = imgEl.offsetTop  + "px";
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    canvas.style.pointerEvents = "none";
    canvas.style.zIndex = 9999;

    // Suaviza el borde del efecto para que no sea un “bloque”
    if(typeof blurPx === "number" && blurPx > 0){
      canvas.style.filter = `blur(${blurPx}px)`;
    }
    if(featherMask){
      // Feather con máscara radial (Safari/Chrome usan webkitMaskImage)
      const mask = "radial-gradient(circle at 50% 50%, rgba(0,0,0,1) 65%, rgba(0,0,0,0) 100%)";
      canvas.style.webkitMaskImage = mask;
      canvas.style.maskImage = mask;
      canvas.style.webkitMaskRepeat = "no-repeat";
      canvas.style.maskRepeat = "no-repeat";
      canvas.style.webkitMaskSize = "100% 100%";
      canvas.style.maskSize = "100% 100%";
    }

    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);

    parent.appendChild(canvas);

    const ctx = canvas.getContext("2d", { willReadFrequently:true });
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;

    ctx.clearRect(0,0,w,h);
    ctx.drawImage(imgEl, 0, 0, w, h);

    let imgData;
    try{
      imgData = ctx.getImageData(0, 0, w, h);
    }catch(e){
      // Si por CORS u otros motivos no se puede leer, hacemos fallback
      canvas.remove();
      onDone && onDone();
      return;
    }
    const data = imgData.data;

    const parts = [];
    for(let y=0; y<h; y+=step){
      for(let x=0; x<w; x+=step){
        const i = (y * w + x) * 4;
        const a = data[i+3];
        if(a > 20){
          parts.push({
            x, y,
            vx: (Math.random()*2 - 1) * (spread/25),
            vy: (Math.random()*2 - 1) * (spread/35) - 0.8,
            r: data[i],
            g: data[i+1],
            b: data[i+2],
            a: a/255
          });
        }
      }
    }

    // Oculta la img real mientras el canvas la “rompe”
    const prevVis = imgEl.style.visibility;
    imgEl.style.visibility = "hidden";

    const t0 = performance.now();
    function frame(t){
      const p = Math.min(1, (t - t0) / duration);
      ctx.clearRect(0,0,w,h);

      // Dibujamos “partículas” como rectángulos suavizados (con blur/mask en CSS)
      for(const pt of parts){
        pt.x += pt.vx;
        pt.y += pt.vy + gravity * (p * 18);
        pt.vx *= 0.99;
        pt.vy *= 0.99;

        const alpha = fade ? pt.a * (1 - p) : pt.a;
        if(alpha <= 0) continue;

        ctx.fillStyle = `rgba(${pt.r},${pt.g},${pt.b},${alpha})`;
        ctx.fillRect(pt.x, pt.y, step, step);
      }

      if(p < 1){
        requestAnimationFrame(frame);
      }else{
        canvas.remove();
        if(!keepHiddenAfter){
          imgEl.style.visibility = prevVis;
        }
        onDone && onDone();
      }
    }
    requestAnimationFrame(frame);
  }catch(err){
    // Nunca bloquear el juego por un efecto visual
    try{ onDone && onDone(); }catch(e){}
  }
}

  function resolveTurn(){
    if(player.hp <= 0) return;

    // Estrategia: si se acabó el tiempo, derrota inmediata
    if(runModeId === "strategy" && runState && runState.endsAt && Date.now() > runState.endsAt){
      handleStrategyTimeout();
      return;
    }

    const answerRaw = answerEl.value;
    if(!answerRaw.trim()){
      setLog(`<span class="bad">No has escrito nada.</span> El monstruo se ríe. Intenta reescribir la frase completamente corregida.`);
      return;
    }

    // Anti-spam: evita múltiples clicks/Enter durante la animación del mismo turno
    if(battleState.isDeathAnimating || battleState.isTurnResolving) return;
    battleState.isTurnResolving = true;
    lockBattleControls();

    const monster = getMonsterAt(currentMonsterIndex);
    const correctNorm = normalize(currentPhrase.correct);
    const givenNorm = normalize(answerRaw);
    const dist = levenshtein(correctNorm, givenNorm);
    const length = Math.max(correctNorm.length,1);
    let ratio = dist / length;

    if(battleState.autoCorrectBoost){
      ratio *= 0.5;
      battleState.autoCorrectBoost = false;
    }

    let playerDamage = 0;
    let monsterDamage = 0;
    let xpGain = 0;
    let feedback = "";
    let forceWinByStreak = false;

    if(dist === 0){
      playerDamage = 40;
      monsterDamage = 0;
      xpGain = 30;
      feedback = `<span class="good">¡Crítico ortográfico!</span> Has clavado la frase. Súper ataque y mucha experiencia.`;
      
      // Solo sumamos el punto en la memoria del jugador (el juego ya lo enviará al Excel al terminar el turno)
      if (window.player) window.player.stats_correct = (window.player.stats_correct || 0) + 1;
      
    }else if(ratio <= 0.15){
      playerDamage = 25;
      monsterDamage = 10;
      xpGain = 18;
      feedback = `<span class="good">Bastante bien.</span> Hay detalles mejorables, pero tu ataque es sólido. Recibes un ligero contraataque.`;
      
      // Sumamos error
      if (window.player) window.player.stats_wrong = (window.player.stats_wrong || 0) + 1;
      
    }else{
      playerDamage = 7;
      monsterDamage = 25;
      xpGain = 8;
      feedback = `<span class="bad">El monstruo aprovecha tus errores.</span> Tu ataque apenas le roza y su frase mal escrita te hiere la vista.`;
      
      // Sumamos error
      if (window.player) window.player.stats_wrong = (window.player.stats_wrong || 0) + 1;
    }

    // Modo Dominio: la victoria depende de una racha perfecta
    if(runRules && runRules.winByPerfectStreak){
      const goal = runRules.winByPerfectStreak;
      runState.perfectStreak = (dist === 0) ? ((runState.perfectStreak||0)+1) : 0;
      if(dist === 0 && runState.perfectStreak >= goal){
        forceWinByStreak = true;
      }
      feedback += `<br><span class="hint">Racha Dominio: <strong>${runState.perfectStreak}</strong> / ${goal}</span>`;
      // El daño al monstruo no importa en este modo: la vida no se reduce
      playerDamage = 0;
      xpGain = 0;
    }

    // Modos sin recompensas
    if(runRules && !runRules.allowRewards){
      xpGain = 0;
    }

    // Color respuesta
    answerEl.classList.remove("answer-good","answer-medium","answer-bad");
    if(dist === 0) answerEl.classList.add("answer-good");
    else if(ratio <= 0.15) answerEl.classList.add("answer-medium");
    else answerEl.classList.add("answer-bad");

    // Aura
    heroVisualEl.classList.remove("hero-aura");
    if(dist === 0 || ratio <= 0.15){
      heroVisualEl.classList.add("hero-aura");
      setTimeout(()=> heroVisualEl.classList.remove("hero-aura"), 450);
    }

    if(battleState.poweredAttackTurns > 0 && playerDamage > 0){
      playerDamage = Math.round(playerDamage * 1.5);
      feedback += `<br><span class="good">Tu ira ortográfica potencia el ataque.</span>`;
      battleState.poweredAttackTurns--;
    }

    if(battleState.poisonTurns > 0 && playerDamage > 0){
      const extraPoison = 8;
      playerDamage += extraPoison;
      feedback += `<br><span class="good">La tinta corrosiva sigue actuando (+${extraPoison} de daño).</span>`;
      battleState.poisonTurns--;
    }

    if(battleState.perfectTildeBonus && dist === 0){
      const bonus = Math.round(playerDamage * 0.5);
      playerDamage += bonus;
      feedback += `<br><span class="good">El Expansor de tildes potencia tu ataque perfecto (+${bonus} de daño).</span>`;
      battleState.perfectTildeBonus = false;
    }

    if(battleState.damageBoostTurns > 0){
      playerDamage = Math.round(playerDamage * 1.6);
      battleState.damageBoostTurns--;
      feedback += `<br><span class="good">La Corona potencia tu daño.</span>`;
    }

    monsterDamage = Math.round(monsterDamage * (monster.damageMultiplier || 1));
    if(monster.special && ratio > 0.3 && monster.special.type === "extraOnBigError"){
      monsterDamage += monster.special.extra;
      feedback += `<br><span class="bad">Su poder especial <strong>${monster.special.name}</strong> aumenta el daño.</span>`;
    }

    if(battleState.weakenTurns > 0 && monsterDamage > 0){
      monsterDamage = Math.round(monsterDamage * 0.6);
      feedback += `<br><span class="good">La Poción debilitante hace efecto.</span>`;
      battleState.weakenTurns--;
    }

    if(battleState.freezeTurns > 0 && monsterDamage > 0){
      monsterDamage = 0;
      feedback += `<br><span class="good">El monstruo está congelado: no consigue dañarte.</span>`;
      battleState.freezeTurns--;
    }else{
      if(battleState.dodgeTurns > 0 && monsterDamage > 0){
        monsterDamage = 0;
        feedback += `<br><span class="good">Esquivas por completo el ataque.</span>`;
        battleState.dodgeTurns--;
      }
      if(battleState.shieldTurns > 0 && monsterDamage > 0){
        monsterDamage = Math.round(monsterDamage * 0.5);
        feedback += `<br><span class="good">Tu escudo reduce el daño recibido.</span>`;
        battleState.shieldTurns--;
      }
    }

    // Animaciones ataque
    heroVisualEl.classList.remove("hero-attacking");
    void heroVisualEl.offsetWidth;
    heroVisualEl.classList.add("hero-attacking");
    setTimeout(()=> heroVisualEl.classList.remove("hero-attacking"), 400);

    if(monsterDamage > 0){
      setTimeout(()=>{
        monsterVisualEl.classList.remove("monster-attacking");
        void monsterVisualEl.offsetWidth;
        monsterVisualEl.classList.add("monster-attacking");
        setTimeout(()=> monsterVisualEl.classList.remove("monster-attacking"), 400);
      }, 150);
    }

    // Flotantes + shakes
    if(playerDamage > 0){
      showDamage(monsterVisualEl, playerDamage, "damage-player");
      monsterVisualEl.classList.add("hit-flash");
      setTimeout(()=> monsterVisualEl.classList.remove("hit-flash"), 250);
      if(monsterHpBarWrap){ monsterHpBarWrap.classList.add("shake"); setTimeout(()=>monsterHpBarWrap.classList.remove("shake"), 300); }
    }
    if(monsterDamage > 0){
