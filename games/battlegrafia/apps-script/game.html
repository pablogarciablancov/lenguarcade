window.BG_ACHIEVEMENTS_CATALOG = ACHIEVEMENTS;

 
 const CAT_LABELS = {
    progreso:"Progreso", precision:"Precisión", combate:"Combate", diario:"Diario",
    economia:"Economía", exploracion:"Exploración", habilidad:"Habilidad", absurdo:"Absurdos"
  };

  function ensureAchievements(){
    if(typeof player === "undefined" || !player) return false;
    if(!player.achievements) player.achievements = { unlocked:[], progress:{}, titles:[] };
    if(!Array.isArray(player.achievements.unlocked)) player.achievements.unlocked = [];
    if(!player.achievements.progress || typeof player.achievements.progress !== "object") player.achievements.progress = {};
    if(!Array.isArray(player.achievements.titles)) player.achievements.titles = [];
    return true;
  }

  function prog(key, fallback=0){
    if(!ensureAchievements()) return fallback;
    const v = player.achievements.progress[key];
    return (typeof v==="number" ? v : fallback);
  }
  function setProg(key, val){
    if(!ensureAchievements()) return;
    player.achievements.progress[key]=val;
  }
  function inc(key, delta=1){
    setProg(key, prog(key,0)+delta);
  }

  function isUnlocked(id){
    if(!ensureAchievements()) return false;
    return player.achievements.unlocked.includes(id);
  }

  function addTitle(t){
    if(!ensureAchievements()) return;
    if(!t) return;
    if(!player.achievements.titles.includes(t)) player.achievements.titles.push(t);
  }

  function toast(msg){ try{ if(typeof showToast === "function") showToast(msg); else console.log("[LOGRO]", msg); }catch(e){ console.log("[LOGRO]", msg); } }

  function applyReward(a){
    const r=a.reward||{};
    if(r.exp && typeof addXP === "function") addXP(r.exp);
    if(r.gold && typeof addGold === "function") addGold(r.gold);
    if(r.title) addTitle(r.title);
  }

  function unlock(id){
    if(!ensureAchievements()) return false; 
    if(isUnlocked(id)) return false;
    player.achievements.unlocked.push(id);
    try{ savePlayer?.(); }catch(e){}
    const a = ACHIEVEMENTS.find(x=>x.id===id);
    if(a){ applyReward(a); toast(`🏆 Logro desbloqueado: ${a.title}`); }
    const s=document.getElementById("achievements-screen");
    if(s && s.style.display==="flex") renderAchievements();
    return true;
  }

  function achievementCategory(a){
    const id=a.id;
    if(id <= "a010") return "progreso";
    if(id >= "a011" && id <= "a020") return "precision";
    if(id >= "a021" && id <= "a030") return "combate";
    if(id >= "a031" && id <= "a040") return "economia";
    if(id >= "a041" && id <= "a050") return "diario";
    if(id >= "a051" && id <= "a055") return "exploracion";
    if(id >= "a056" && id <= "a060") return "habilidad";
    return "absurdo";
  }

  let currentCat = "progreso";

  
  let lastNonAchMode = "battle";
function renderAchievements(){
    ensureAchievementsUI(); ensureAchievements();
    const grid = document.getElementById("ach-grid");
    const summaryEl = document.getElementById("ach-summary");
    const catsEl = document.getElementById("ach-cats");
    if(!grid || !summaryEl || !catsEl) return;

    const total = ACHIEVEMENTS.length;
    const unlockedCount = player.achievements.unlocked.length;
    const pct = Math.round((unlockedCount / Math.max(1,total)) * 100);
    const titles = (player.achievements.titles||[]).length;
    summaryEl.innerHTML = `<div><strong>${unlockedCount}/${total}</strong> logros · <strong>${pct}%</strong></div><div>Títulos: <strong>${titles}</strong></div>`;

    const cats = ["progreso","precision","combate","economia","diario","exploracion","habilidad","absurdo"];
    catsEl.innerHTML = cats.map(c => `<button class="ach-chip ${c===currentCat ? "active":""}" data-cat="${c}">${CAT_LABELS[c]}</button>`).join("");
    catsEl.querySelectorAll(".ach-chip").forEach(btn=>{ btn.addEventListener("click", ()=>{ currentCat = btn.dataset.cat; renderAchievements(); }); });

    const list = ACHIEVEMENTS.filter(a=>achievementCategory(a)===currentCat);
    grid.innerHTML = list.map(a=>cardHtml(a)).join("");
  }

  function cardHtml(a){
    const done = isUnlocked(a.id);
    const cat = achievementCategory(a);
    let stateClass = done ? "unlocked" : "locked";
    let title = a.title;
    let desc = a.desc;

    if(!done && a.hidden){ stateClass="hidden"; title="???"; desc="Logro oculto. Se revelará cuando lo consigas."; }

    let progressHtml = "";
    if(!done && a.type==="count" && a.key && a.target){
      const v = prog(a.key, 0);
      const pct = Math.max(0, Math.min(100, Math.round((v / a.target) * 100)));
      progressHtml = `<div class="ach-progress"><div style="width:${pct}%"></div></div><div class="ach-meta">${v} / ${a.target}</div>`;
    } else if(done) {
      progressHtml = `<div class="ach-meta">Desbloqueado ✓</div>`;
    } else {
      progressHtml = `<div class="ach-meta">${CAT_LABELS[cat]}</div>`;
    }

    return `<div class="ach-card ${stateClass}"><div class="ach-icon">${a.icon || "🏆"}</div><div style="min-width:0; flex:1;"><p class="ach-title">${title}</p><p class="ach-desc">${desc}</p>${progressHtml}</div></div>`;
  }

  function evalMetaCheck(checkName){
    try{
      if(checkName==="playerLevel>=2") return (player.level||1) >= 2;
      if(checkName==="tabsAll") return prog("tabsVisitedCount",0) >= 6;
      if(checkName==="playedOnMonday") return prog("playedMonday",0) >= 1;
      if(checkName==="playedAtNight") return prog("playedNight",0) >= 1;
      if(checkName==="unlocked99") return (player.achievements.unlocked.length >= 99);
      return false;
    }catch(e){ return false; }
  }

  function evaluateAll(){
    ensureAchievements();
    try{
      const g = player.gold||0;
      if(g > prog("maxGoldEver",0)) setProg("maxGoldEver", g);
      const items = player.items ? player.items.length : 0;
      if(items > prog("maxItemsEver",0)) setProg("maxItemsEver", items);
      const cards = player.cards ? player.cards.length : 0;
      setProg("cardsNow", cards);
    }catch(e){}

    for(const a of ACHIEVEMENTS){
      if(isUnlocked(a.id)) continue;
      if(a.type==="count" && a.key && a.target){ if(prog(a.key,0) >= a.target) unlock(a.id); }
      else if(a.type==="meta" && a.check){ if(evalMetaCheck(a.check)) unlock(a.id); }
    }
  }

  function checkAchievements(eventName, payload={}){
    ensureAchievements();
    for(const a of ACHIEVEMENTS){
      if(isUnlocked(a.id)) continue;
      if(a.type==="event" && a.event===eventName) unlock(a.id);
    }
    evaluateAll();
  }

  function wrapGlobalFn(fnName, after){
    const fn = window[fnName];
    if(typeof fn !== "function") return;
    if(fn.__ach_wrapped) return;
    const wrapped = function(...args){ const res = fn.apply(this, args); try{ after?.(args, res); }catch(e){} return res; };
    wrapped.__ach_wrapped = true;
    window[fnName] = wrapped;
  }

  function wrapLocalFn(getter, setter, after){
    try{
      const fn = getter?.();
      if(typeof fn !== "function") return;
      if(fn.__ach_wrapped) return;
      const wrapped = function(...args){
        const res = fn.apply(this, args);
        try{ after?.(args, res); }catch(e){}
        return res;
      };
      wrapped.__ach_wrapped = true;
      setter?.(wrapped);
    }catch(e){}
  }

  function hookSwitchTo(){
    const navBtn = document.getElementById("nav-achievements");
    if(navBtn && !navBtn.dataset.bound){
      navBtn.dataset.bound="1";
      navBtn.addEventListener("click", ()=>{ if(typeof switchTo === "function") switchTo("achievements"); else showAchievements(); });
    }

    wrapGlobalFn("switchTo", (args)=>{
      const mode = args[0];
      const s = document.getElementById("achievements-screen");
      if(mode !== "achievements"){ lastNonAchMode = mode || lastNonAchMode || "battle"; if(s) s.style.display="none"; }

      const nav=document.getElementById("nav-achievements");
      if(nav){
        if(mode === "achievements"){ nav.classList.add("nav-active"); nav.classList.remove("secondary"); showAchievements(); checkAchievements("ach_nav_fixed"); }
        else { nav.classList.remove("nav-active"); nav.classList.add("secondary"); }
      }

      inc("screenVisits", 1);
      const tabSet = player.achievements.progress.__tabs || {};
      tabSet[mode] = true;
      player.achievements.progress.__tabs = tabSet;
      setProg("tabsVisitedCount", Object.keys(tabSet).filter(k=>tabSet[k]).length);

      if(mode==="map") inc("mapVisits",1);
      if(mode==="camp") inc("campVisits",1);
      if(mode==="diary") inc("diaryVisits",1);
      if(mode==="history") inc("historyVisits",1);
      if(mode==="rules") inc("rulesVisits",1);
      if(mode==="achievements") inc("achVisits",1);

      evaluateAll();
    });
  }

  function hookGameEvents(){
    wrapGlobalFn("resolveTurn", ()=>{
      inc("turns",1);
      checkAchievements("turn_done");

      const d = (player.diary||[]);
      if(d.length){
        const last = d[d.length-1];
        const stamp = last.timestamp || "";
        const prev = player.achievements.progress.__lastDiaryStamp || "";
        if(stamp && stamp !== prev){
          player.achievements.progress.__lastDiaryStamp = stamp;
          inc("diaryEntries",1);

          // "Success" heuristic: playerDamage > 0
          if(last.playerDamage > 0){
            inc("correctTurns",1);
            inc("correctStreak",1);
            // non-perfect success
            if(!last.isPerfect) checkAchievements("nonperfect_success");
            if(last.isPerfect){
              inc("perfectTurns",1);
              inc("perfectStreak",1);
              if((last.correctPhrase||"").includes(",")) inc("perfectWithComma",1);
              if((last.correctPhrase||"").includes(",")) checkAchievements("perfect_with_comma");
              // comeback perfect (3 after fail) – rough: if correctStreak == 3 and perfectStreak == 3 but previous turn wasn't correct
              if(prog("afterFailPerfectStreak",0) >= 2) checkAchievements("comeback_perfect");
              inc("afterFailPerfectStreak",1);
              // perfect after hint
              if(prog("hintJustUsed",0)===1){ setProg("fightPerfectAfterHint",1); checkAchievements("perfect_after_hint"); }
            } else {
              setProg("perfectStreak",0);
              setProg("afterFailPerfectStreak",0);
            }
          } else {
            setProg("correctStreak",0);
            setProg("perfectStreak",0);
            setProg("afterFailPerfectStreak",0);
          }

          // long phrase
          if((last.correctPhrase||"").length >= 120) checkAchievements("long_phrase");

          // similarity events
          try{
            if(window.levenshtein && typeof last.studentAnswer==="string" && typeof last.correctPhrase==="string"){
              const dist = window.levenshtein(last.studentAnswer, last.correctPhrase);
              if(dist === 1) checkAchievements("distance_1");
              const maxLen = Math.max(last.studentAnswer.length, last.correctPhrase.length, 1);
              const sim = 1 - (dist / maxLen);
              if(!last.isPerfect && sim >= 0.95) checkAchievements("high_similarity");
              if(!last.isPerfect && sim >= 0.98) checkAchievements("very_high_similarity");
            }
          }catch(e){}

          // low hp survival counter for a025
          try{
            const hp = player.hp||0, maxHp = player.maxHp||100;
            if(hp <= Math.ceil(maxHp*0.30)){ inc("fightLowHpTurns",1); if(prog("fightLowHpTurns",0) >= 3) checkAchievements("survive_low_hp_3"); }
            else setProg("fightLowHpTurns",0);
          }catch(e){}

          // ghost mode (5 min, no items/hints) – handled by timer below

          setProg("hintJustUsed",0);
          evaluateAll();
        }
      }
      evaluateAll();
    });

    wrapGlobalFn("registerMonsterDefeated", (args)=>{
      inc("wins",1);
      setProg("winStreak", prog("winStreak",0)+1);

      const id=args[0];
      const set = player.achievements.progress.__uniq || {};
      if(id) set[id]=true;
      player.achievements.progress.__uniq=set;
      setProg("uniqueMonstersDefeated", Object.keys(set).length);

      const hp = player.hp||0, maxHp = player.maxHp||100;
      if(hp <= 5) checkAchievements("win_low_hp");
      if(hp <= Math.ceil(maxHp*0.25)) checkAchievements("win_comeback");
      if(prog("fightItemsUsed",0)===0) checkAchievements("win_no_items");
      if(prog("fightHintsUsed",0)===0) checkAchievements("win_no_hints");
      if(prog("fightItemsUsed",0)===0 && prog("fightHintsUsed",0)===0) checkAchievements("flawless_win");

      // session wins
      const sw = prog("sessionWins",0)+1;
      setProg("sessionWins", sw);
      if(sw>=3) checkAchievements("three_wins_session");

      // reset fight counters
      setProg("fightItemsUsed",0);
      setProg("fightHintsUsed",0);
      setProg("fightLowHpTurns",0);
      setProg("fightPerfectAfterHint",0);

      checkAchievements("monster_defeated");
      evaluateAll();
    });

    wrapGlobalFn("useItem", ()=>{ inc("itemsUsed",1); inc("fightItemsUsed",1); evaluateAll(); });
    wrapGlobalFn("useAbility", ()=>{ inc("abilitiesUsed",1); evaluateAll(); });
    wrapGlobalFn("getHint", ()=>{ inc("hintsUsed",1); inc("fightHintsUsed",1); setProg("hintJustUsed",1); evaluateAll(); });
    wrapGlobalFn("buyShopItem", ()=>{ inc("shopBuys",1); evaluateAll(); });

    wrapGlobalFn("handleDefeat", ()=>{ inc("deaths",1); setProg("winStreak",0); setProg("__lastDefeatTime", Date.now()); evaluateAll(); });

    wrapGlobalFn("loadMonster", ()=>{
      if(!ensureAchievements()) return;
      const lastName = player.achievements.progress.__lastMonsterName || "";
      try{
        const name = (window.monster && window.monster.name) ? window.monster.name : "";
        if(name && lastName === name) checkAchievements("same_monster_twice");
        if(name) player.achievements.progress.__lastMonsterName = name;
      }catch(e){}
      setProg("fightItemsUsed",0);
      setProg("fightHintsUsed",0);
      setProg("fightLowHpTurns",0);
      setProg("fightPerfectAfterHint",0);
      evaluateAll();
    });
  }

  function hookSession(){
    if(!ensureAchievements()) return;   // <-- FIX: si no hay player, no toques logros
    const now = new Date();
    const key = now.toISOString().slice(0,10);
    const days = player.achievements.progress.__days || {};
    if(!days[key]){ days[key]=true; player.achievements.progress.__days=days; setProg("daysPlayed", Object.keys(days).length); }

    if(now.getDay()===1) setProg("playedMonday", 1);
    const hour = now.getHours();
    if(hour >= 22 || hour <= 5) setProg("playedNight", 1);

    setProg("__sessionStart", Date.now());
    setProg("sessionWins", 0);
    setProg("__lastTabSwitch", Date.now());

    setInterval(()=>{
      const start = prog("__sessionStart", Date.now());
      const mins = (Date.now()-start)/60000;
      if(mins>=15) checkAchievements("play_15m");
      if(mins>=30) checkAchievements("play_30m");
      if(mins>=60) checkAchievements("play_60m");
      if(mins>=20) checkAchievements("no_reload_20m");

      // ghost mode: 5 min with no items and no hints
      if(mins>=5 && prog("fightItemsUsed",0)===0 && prog("fightHintsUsed",0)===0) checkAchievements("ghost_mode");

      evaluateAll();
    }, 5000);

    setInterval(()=>{
      const tabs = player.achievements.progress.__tabs || {};
      if(tabs["diary"] && tabs["rules"]) checkAchievements("study_combo");
    }, 2000);
  }

  function initAchievementsModule(){
    // En esta versión modular, muchas funciones viven en el scope del motor,
    // pero el sistema de logros envuelve funciones globales (window.*).
    // Las exponemos aquí para que los hooks funcionen.
    try{
      if(typeof switchTo === "function") window.switchTo = switchTo;
      if(typeof resolveTurn === "function") window.resolveTurn = resolveTurn;
      if(typeof registerMonsterDefeated === "function") window.registerMonsterDefeated = registerMonsterDefeated;
      if(typeof useItem === "function") window.useItem = useItem;
      if(typeof useAbility === "function") window.useAbility = useAbility;
      if(typeof getHint === "function") window.getHint = getHint;
      if(typeof buyShopItem === "function") window.buyShopItem = buyShopItem;
      if(typeof handleDefeat === "function") window.handleDefeat = handleDefeat;
      if(typeof loadMonster === "function") window.loadMonster = loadMonster;
    }catch(e){}
    ensureAchievementsUI();
    hookSwitchTo();
    hookGameEvents();
    try{ checkAchievements("ach_nav_fixed"); }catch(e){}


    // Asegurar que las llamadas internas también pasan por las funciones envueltas
    try{
      if(window.switchTo && window.switchTo.__ach_wrapped) switchTo = window.switchTo;
      if(window.resolveTurn && window.resolveTurn.__ach_wrapped) resolveTurn = window.resolveTurn;
      if(window.registerMonsterDefeated && window.registerMonsterDefeated.__ach_wrapped) registerMonsterDefeated = window.registerMonsterDefeated;
      if(window.useItem && window.useItem.__ach_wrapped) useItem = window.useItem;
      if(window.useAbility && window.useAbility.__ach_wrapped) useAbility = window.useAbility;
      if(window.getHint && window.getHint.__ach_wrapped) getHint = window.getHint;
      if(window.buyShopItem && window.buyShopItem.__ach_wrapped) buyShopItem = window.buyShopItem;
      if(window.handleDefeat && window.handleDefeat.__ach_wrapped) handleDefeat = window.handleDefeat;
      if(window.loadMonster && window.loadMonster.__ach_wrapped) loadMonster = window.loadMonster;
    }catch(e){}

    hookSession();
    evaluateAll();
    window.renderAchievements = renderAchievements;
    window.showAchievements = showAchievements;
    window.hideAchievements = hideAchievements;
  }

  initAchievementsModule();
  setTimeout(initAchievementsModule, 250);
  setTimeout(initAchievementsModule, 1200);
})();
;

  


  /* ===========================

  (function(){
    const navAcc = document.getElementById("nav-account");
    const navTeach = document.getElementById("nav-teacher");
    const overlay = document.getElementById("authOverlay");
    const closeBtn = document.getElementById("authClose");
    const tabLogin = document.getElementById("tabLogin");
    const tabSignup = document.getElementById("tabSignup");
    const doLoginBtn = document.getElementById("authDoLogin");
    const doSignupBtn = document.getElementById("authDoSignup");
    const doLogoutBtn = document.getElementById("authDoLogout");
    const teacherRefresh = document.getElementById("teacherRefresh");

    if(navAcc) navAcc.addEventListener("click", openAuth);
    if(closeBtn) closeBtn.addEventListener("click", closeAuth);
    if(overlay) overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeAuth(); });

    if(tabLogin) tabLogin.addEventListener("click", ()=>setAuthMode("login"));
    if(tabSignup) tabSignup.addEventListener("click", ()=>setAuthMode("signup"));

    if(doLoginBtn) doLoginBtn.addEventListener("click", ()=>{ if(sb) doLogin(); });
    if(doSignupBtn) doSignupBtn.addEventListener("click", ()=>{ if(sb) doSignup(); });
    if(doLogoutBtn) doLogoutBtn.addEventListener("click", ()=>{ if(sb) doLogout(); });

    if(navTeach) navTeach.addEventListener("click", openAuth);

    async function refreshTeacher(){
      const list = document.getElementById("teacherList");
      if(!list) return;
      list.innerHTML = "Cargando...";
      try{
        let rows = await teacherFetchSubmissions();
        if(!rows.length){
          list.innerHTML = "<div class='teacher-row'><small>No hay datos o no tienes permisos.</small></div>";
          return;
        }
        // cache para exportación
        window.__teacherRows_full = rows;
        window.__teacherRows = rows;

        // Filtro por texto (nombre o email)
        try{
          const q = (document.getElementById('teacherFilter')?.value || '').trim().toLowerCase();
          if(q){
            const filtered = rows.filter(r=>{
              const p = r.progress || {};
              const name = String(p.name||'').toLowerCase();
              const email = String(r.email||'').toLowerCase();
              return name.includes(q) || email.includes(q);
            });
            window.__teacherRows = filtered;
            rows = filtered;
          }
        }catch(e){}
        list.innerHTML = rows.map(r=>{
          const p = r.progress || {};
          const name = escapeHtml((p.name || '').trim() || (r.email || 'Alumno'));
          const lvl = (p.level ?? '-');
          const md  = (p.monstersDefeated ?? '-');
          const gold = (p.gold ?? '-');
          const when = fmtWhen(r.exported_at || Date.now());
          const email = escapeHtml(r.email || '');
          const id = r.id;
          return "<div class='teacher-row' data-sub-id='"+escapeHtml(id)+"'>" +
                 "<div><b>"+name+"</b><br><small>"+email+" · Nivel "+lvl+" · "+md+" monstruos · "+gold+" oro</small></div>" +
                 "<div style='display:flex;gap:8px;align-items:center;'>" +
                   "<button class='btn tiny secondary teacher-dl' data-id='"+escapeHtml(id)+"'>JSON</button>" +
                   "<small>"+escapeHtml(when)+"</small>" +
                 "</div>" +
                 "</div>";
        }).join("");
      }catch(e){
        list.innerHTML = "<div class='teacher-row'><small>Error: "+escapeHtml(e.message || e)+"</small></div>";
      }
    }

    if(teacherRefresh) teacherRefresh.addEventListener("click", refreshTeacher);

    // Descargar JSON de una entrega
    document.addEventListener('click', (e)=>{
      const btn = e.target && e.target.closest ? e.target.closest('.teacher-dl') : null;
      if(!btn) return;
      const id = btn.getAttribute('data-id');
      if(!id) return;
      const rows = window.__teacherRows_full || window.__teacherRows || [];
      const row = rows.find(r=>String(r.id)===String(id));
      if(!row){ alert('No se encontró la entrega. Pulsa Actualizar.'); return; }
      const payload = row.payload || { progress: row.progress || null, meta:{ id: row.id, email: row.email, exported_at: row.exported_at, build: row.build } };
      const safe = String((row.email||'alumno').split('@')[0]||'alumno').replace(/[^a-z0-9_-]+/gi,'_').slice(0,24);
      const fn = `battlegrafia_entrega_${safe}_${String(row.exported_at||'').slice(0,10)}.json`;
      downloadFile(fn, JSON.stringify(payload, null, 2), 'application/json;charset=utf-8');
    });


    function downloadCsv(filename, csvText){
      try{
        const blob = new Blob([csvText], {type:"text/csv;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(()=>URL.revokeObjectURL(url), 800);
      }catch(e){ alert("No se pudo exportar el CSV."); }
    }

    function exportTeacherCsv(){
      const rows = window.__teacherRows || [];
      if(!rows.length){ alert("Primero pulsa ‘Actualizar’ para cargar datos."); return; }
      const header = ["id","user_id","email","nombre","nivel","xp","oro","monstruos_derrotados","mundo","exported_at"].join(",");
      const lines = rows.map(r=>{
        const p = r.progress || {};
        const when = (r.exported_at || '');
        const vals = [
          r.id || '',
          r.user_id || '',
          r.email || '',
          p.name || '',
          p.level ?? '',
          p.xp ?? '',
          p.gold ?? '',
          p.monstersDefeated ?? '',
          p.world ?? '',
          when
        ].map(v=>`"${String(v).replace(/"/g,'""')}"`);
        return vals.join(',');
      });
      const csv = [header].concat(lines).join("\n");
      const fn = `battlegrafia_entregas_${new Date().toISOString().slice(0,10)}.csv`;
      downloadCsv(fn, csv);
    }

    const tf = document.getElementById('teacherFilter');
    if(tf) tf.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); refreshTeacher(); } });
  })();
  
// Interceptamos cualquier guardado local (como comprar en la tienda) y lo subimos al Excel
const originalSetItem = localStorage.setItem;
localStorage.setItem = function(key, value) {
  originalSetItem.apply(this, arguments);
  
  // Si el juego intenta guardar el slot de aventura (por ejemplo, al comprar un objeto en el menú)
  if(key === "battlegrafia_save_slots_v1_adventure") {
    try {
      const slots = JSON.parse(value);
      const activeSlot = localStorage.getItem("battlegrafia_active_slot_v1_adventure");
      const activeData = slots.find(s => s && s.id === activeSlot);
      
      if(activeData && activeData.data) {
        // Actualizamos la variable global del jugador
        window.player = activeData.data;
        // Refrescamos la mochila visual del menú
        actualizarMochilaHub();
        // Mandamos a guardar a Google Sheets
        scheduleRemoteSave();
      }
    } catch(e) {}
  }
};
