<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LenguArcade - Profesor</title>
  <style>
    :root{--bg:#070b16;--panel:#101a2e;--panel2:#142543;--text:#eef6ff;--muted:#9fb2d0;--cyan:#22d3ee;--pink:#fb7185;--gold:#fbbf24;--green:#34d399;--violet:#a78bfa;--line:rgba(255,255,255,.12)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 80% 0%,#243b76 0,#070b16 43%,#040711 100%)}.wrap{max-width:1360px;margin:0 auto;padding:22px}.top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:14px}.logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--pink),var(--cyan));display:grid;place-items:center;font-size:32px;box-shadow:0 0 30px rgba(251,113,133,.3)}h1{font-size:34px;margin:0}.sub{color:var(--muted)}.pill{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;padding:8px 12px;color:var(--muted)}.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}.filters{display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:18px}.filters>div{min-width:210px}label{display:block;color:var(--muted);font-size:13px;margin:0 0 6px}select{width:100%;padding:12px;border-radius:14px;border:1px solid var(--line);background:#071226;color:var(--text)}button{border:0;border-radius:14px;padding:12px 14px;font-weight:800;color:#07111f;background:linear-gradient(135deg,var(--cyan),var(--green));cursor:pointer}.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}.kpi{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:18px;padding:14px}.kpi b{display:block;font-size:28px}.grid{display:grid;grid-template-columns:1.35fr .85fr;gap:18px}.cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line);font-size:14px}th{color:var(--muted);font-weight:700}tr:hover td{background:rgba(255,255,255,.04)}.bar{height:10px;background:rgba(255,255,255,.09);border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));width:0}.game-row,.err,.rec{padding:11px;border:1px solid var(--line);background:rgba(0,0,0,.18);border-radius:14px;margin-bottom:10px}.game-head{display:flex;justify-content:space-between;gap:10px}.status{margin-top:12px;color:var(--muted);font-size:13px;white-space:pre-wrap}@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}.grid,.cols{grid-template-columns:1fr}}@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}.top{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="brand"><div class="logo">🛰️</div><div><h1>Panel del profesor</h1><div class="sub">Seguimiento general de LenguArcade</div></div></div><div class="pill" id="version">v0.1</div></div>
  <div class="card filters"><div><label>Clase</label><select id="classSelect"><option value="">Todas</option></select></div><div><label>Juego</label><select id="gameSelect"><option value="">Todos</option></select></div><button onclick="loadTeacher()">Actualizar</button><button onclick="runSetup()">Inicializar / reparar Sheet</button></div>
  <div class="kpis"><div class="kpi"><span>Alumnos</span><b id="studentsTotal">0</b></div><div class="kpi"><span>Activos</span><b id="activeStudents">0</b></div><div class="kpi"><span>Sesiones hoy</span><b id="sessionsToday">0</b></div><div class="kpi"><span>Juegos</span><b id="gamesAvailable">0</b></div><div class="kpi"><span>Logros</span><b id="achievementsTotal">0</b></div><div class="kpi"><span>Media</span><b id="averageGrade">0</b></div></div>
  <div class="grid"><div class="card"><h2>Alumnos</h2><div style="overflow:auto"><table><thead><tr><th>Alumno</th><th>Clase</th><th>XP</th><th>Nivel</th><th>Sesiones</th><th>Juegos</th><th>Precision</th><th>Nota</th></tr></thead><tbody id="studentsBody"></tbody></table></div></div><div class="card"><h2>Juegos mas usados</h2><div id="popularGames"></div></div></div>
  <div class="cols"><div class="card"><h2>Alumno en foco</h2><div id="focus"></div></div><div class="card"><h2>Recomendaciones</h2><div id="recommendations"></div></div></div>
  <div class="cols"><div class="card"><h2>Errores frecuentes</h2><div id="errors"></div></div><div class="card"><h2>Diagnostico</h2><div class="status" id="status">Cargando...</div></div></div>
</div>
<script>
let teacher=null;
function callServer(fn,args){return new Promise((resolve,reject)=>{google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn].apply(null,args||[]);});}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function setStatus(t){document.getElementById('status').textContent=t;}
async function boot(){try{const init=await callServer('getInitialData');document.getElementById('version').textContent='v'+init.version;document.getElementById('classSelect').innerHTML='<option value="">Todas</option>'+init.classes.map(c=>`<option value="${esc(c.classCode)}">${esc(c.nombreVisible)}</option>`).join('');document.getElementById('gameSelect').innerHTML='<option value="">Todos</option>'+init.games.map(g=>`<option value="${esc(g.gameId)}">${esc(g.nombre)}</option>`).join('');await loadTeacher();}catch(e){setStatus('Error inicial: '+(e.message||e));}}
async function runSetup(){setStatus('Ejecutando setupLenguArcade...');try{const r=await callServer('setupLenguArcade');setStatus('Setup correcto. Sheet: '+r.spreadsheetUrl+'\n'+JSON.stringify(r.counts,null,2));await boot();}catch(e){setStatus('Error setup: '+(e.message||e));}}
async function loadTeacher(){setStatus('Cargando panel...');try{teacher=await callServer('getTeacherDashboard',[{classCode:document.getElementById('classSelect').value,gameId:document.getElementById('gameSelect').value}]);renderTeacher(teacher);setStatus('Panel cargado. Si los datos demo aparecen, el backend funciona.');}catch(e){setStatus('Error panel: '+(e.message||e));}}
function renderTeacher(d){const s=d.summary;['studentsTotal','activeStudents','sessionsToday','gamesAvailable','achievementsTotal','averageGrade'].forEach(k=>document.getElementById(k).textContent=s[k]);document.getElementById('studentsBody').innerHTML=d.students.map(st=>`<tr><td><strong>${esc(st.nombre)}</strong><br><span class="sub">${esc(st.email)}</span></td><td>${esc(st.clase)}</td><td>${st.xp}</td><td>${st.level}</td><td>${st.sessions}</td><td>${st.gamesPlayed}</td><td>${st.accuracy}%</td><td><strong>${st.grade}</strong></td></tr>`).join('');document.getElementById('popularGames').innerHTML=d.popularGames.map(g=>`<div class="game-row"><div class="game-head"><strong>${esc(g.icono)} ${esc(g.nombre)}</strong><span>${g.sessions} sesiones</span></div><div class="bar" style="margin-top:8px"><div class="fill" style="width:${g.percent}%"></div></div></div>`).join('');document.getElementById('errors').innerHTML=d.errorSummary.map(e=>`<div class="err"><strong>${esc(e.label)}</strong><br><span class="sub">${e.count} apariciones</span></div>`).join('')||'<div class="sub">Sin errores registrados todavia.</div>';document.getElementById('recommendations').innerHTML=d.recommendations.map(r=>`<div class="rec">${esc(r)}</div>`).join('');renderFocus(d);}
function renderFocus(d){const f=d.focus;if(!f){document.getElementById('focus').innerHTML='<div class="sub">Sin datos.</div>';return;}document.getElementById('focus').innerHTML=`<h3>${esc(f.nombre)}</h3><div class="sub">${esc(f.email)} · ${esc(f.clase)}</div><div class="kpis" style="grid-template-columns:repeat(3,1fr);margin-top:12px"><div class="kpi"><span>XP</span><b>${f.xp}</b></div><div class="kpi"><span>Nivel</span><b>${f.level}</b></div><div class="kpi"><span>Nota</span><b>${f.grade}</b></div></div>`+(d.focusProgress||[]).map(p=>`<div class="game-row"><div class="game-head"><strong>${esc(p.gameName)}</strong><span>${p.percentage}%</span></div><div class="bar" style="margin-top:8px"><div class="fill" style="width:${p.percentage}%"></div></div></div>`).join('');}
boot();
</script>
</body>
</html>
