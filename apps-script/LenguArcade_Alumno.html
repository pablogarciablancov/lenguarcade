<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LenguArcade - Alumno</title>
  <style>
    :root{--bg:#08111f;--panel:#101d33;--panel2:#132847;--text:#eef6ff;--muted:#9fb2d0;--cyan:#22d3ee;--pink:#fb7185;--gold:#fbbf24;--green:#34d399;--violet:#a78bfa;--line:rgba(255,255,255,.12)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 20% 0%,#143b68 0,#08111f 40%,#050814 100%)}
    .wrap{max-width:1280px;margin:0 auto;padding:22px}.top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:14px}.logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-size:32px;box-shadow:0 0 30px rgba(34,211,238,.35)}
    h1{font-size:34px;margin:0;letter-spacing:.5px}.sub{color:var(--muted);margin-top:4px}.pill{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;padding:8px 12px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:330px 1fr;gap:18px}.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    label{display:block;color:var(--muted);font-size:13px;margin:12px 0 6px}select,input{width:100%;padding:12px;border-radius:14px;border:1px solid var(--line);background:#071226;color:var(--text);outline:none}button{border:0;border-radius:14px;padding:12px 14px;font-weight:800;color:#07111f;background:linear-gradient(135deg,var(--cyan),var(--green));cursor:pointer;box-shadow:0 8px 20px rgba(34,211,238,.18)}button.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line);box-shadow:none}.btnrow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}.avatar{width:84px;height:84px;border-radius:26px;background:linear-gradient(135deg,#0ea5e9,#7c3aed);display:grid;place-items:center;font-size:42px;margin-bottom:10px}.name{font-size:24px;font-weight:900}.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}.stat{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:16px;padding:12px}.stat b{display:block;font-size:24px}.bar{height:12px;background:rgba(255,255,255,.09);border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));width:0%}
    .section-title{display:flex;align-items:end;justify-content:space-between;margin:4px 0 14px}.games{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.game{position:relative;overflow:hidden;border-radius:22px;padding:18px;min-height:205px;background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.035));border:1px solid var(--line)}.game:before{content:"";position:absolute;inset:-80px -80px auto auto;width:160px;height:160px;border-radius:50%;background:var(--c);opacity:.28;filter:blur(10px)}.game .icon{font-size:42px}.game h3{margin:12px 0 4px}.game p{color:var(--muted);min-height:40px}.tag{display:inline-block;font-size:12px;color:#06111f;background:var(--c);padding:5px 9px;border-radius:99px;font-weight:900}.locked{opacity:.55}.activity,.ranking,.missions{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:10px;padding:10px;border-radius:14px;background:rgba(0,0,0,.18);border:1px solid var(--line);color:var(--muted)}.row strong{color:var(--text)}.cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}.status{margin-top:12px;color:var(--muted);font-size:13px;white-space:pre-wrap}.hidden{display:none!important}
    @media(max-width:980px){.grid,.cols{grid-template-columns:1fr}.games{grid-template-columns:1fr 1fr}}@media(max-width:640px){.games{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="brand"><div class="logo">🎮</div><div><h1>LenguArcade</h1><div class="sub">Tu biblioteca arcade de Lengua</div></div></div><div class="pill" id="version">v0.1</div></div>
  <div class="grid">
    <aside class="card">
      <div class="avatar">🧑‍🚀</div><div class="name" id="studentName">Elige alumno</div><div class="sub" id="studentMail">Sesion de prueba</div>
      <label>Clase</label><select id="classSelect"></select><label>Alumno</label><select id="studentSelect"></select>
      <div class="btnrow"><button onclick="loadDashboard()">Entrar</button><button class="secondary" onclick="simulateProgress()">Simular progreso</button></div>
      <div class="stats"><div class="stat"><span>XP</span><b id="xp">0</b></div><div class="stat"><span>Nivel</span><b id="level">1</b></div><div class="stat"><span>Plumas</span><b id="plumas">0</b></div></div>
      <label>Progreso de nivel</label><div class="bar"><div class="fill" id="levelFill"></div></div><div class="status" id="status">Cargando datos...</div>
    </aside>
    <main>
      <div class="card"><div class="section-title"><div><h2>Biblioteca de juegos</h2><div class="sub">Como Steam, pero con tildes. Mucho mas peligroso.</div></div><span class="pill" id="grade">Nota orientativa: -</span></div><div class="games" id="games"></div></div>
      <div class="cols"><div class="card"><h2>Misiones</h2><div class="missions" id="missions"></div></div><div class="card"><h2>Ranking de clase</h2><div class="ranking" id="ranking"></div></div></div>
      <div class="card" style="margin-top:18px"><h2>Actividad reciente</h2><div class="activity" id="activity"></div></div>
    </main>
  </div>
</div>
<script>
let initialData=null, currentDashboard=null;
function callServer(fn,args){return new Promise((resolve,reject)=>{google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn].apply(null,args||[]);});}
function setStatus(t){document.getElementById('status').textContent=t;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
async function boot(){try{initialData=await callServer('getInitialData');document.getElementById('version').textContent='v'+initialData.version;renderClassSelect();setStatus('Datos cargados. Elige clase y alumno.');}catch(e){setStatus('Error al cargar: '+(e.message||e));}}
function renderClassSelect(){const sel=document.getElementById('classSelect');sel.innerHTML=initialData.classes.map(c=>`<option value="${esc(c.classCode)}">${esc(c.nombreVisible)}</option>`).join('');sel.onchange=renderStudentSelect;renderStudentSelect();}
function renderStudentSelect(){const cls=document.getElementById('classSelect').value;const st=initialData.students.filter(s=>s.clase===cls);document.getElementById('studentSelect').innerHTML=st.map(s=>`<option value="${esc(s.studentId)}">${esc(s.nombre)} ${esc(s.apellidos)}</option>`).join('');}
async function loadDashboard(){const id=document.getElementById('studentSelect').value;if(!id)return;setStatus('Cargando perfil...');try{currentDashboard=await callServer('getStudentDashboard',[id]);renderDashboard(currentDashboard);setStatus('Perfil cargado.');}catch(e){setStatus('Error: '+(e.message||e));}}
function renderDashboard(d){const s=d.student,g=d.general;document.getElementById('studentName').textContent=s.nombre+' '+s.apellidos;document.getElementById('studentMail').textContent=s.email;document.getElementById('xp').textContent=g.xp;document.getElementById('level').textContent=g.level;document.getElementById('plumas').textContent=g.plumas;document.getElementById('levelFill').style.width=(g.levelProgress||0)+'%';document.getElementById('grade').textContent='Nota orientativa: '+(d.grade.score||0)+'/10';
 document.getElementById('games').innerHTML=d.games.map(game=>`<div class="game ${game.locked?'locked':''}" style="--c:${esc(game.color||'#22d3ee')}"><span class="tag">${esc(game.categoria)}</span><div class="icon">${esc(game.icono||'🎮')}</div><h3>${esc(game.nombre)}</h3><p>${esc(game.descripcion||game.subtitulo)}</p><div class="bar"><div class="fill" style="width:${Number(game.progress.percentage||0)}%"></div></div><div class="row" style="margin-top:10px"><span>XP ${game.progress.xp||0}</span><strong>${esc(game.buttonLabel)}</strong></div></div>`).join('');
 document.getElementById('missions').innerHTML=d.missions.map(m=>`<div class="row"><span>${esc(m.title)} (${m.progress}/${m.target})</span><strong>${m.completed?'✅':'⌛'}</strong></div>`).join('')||'<div class="sub">Sin misiones.</div>';
 document.getElementById('ranking').innerHTML=d.ranking.map((r,i)=>`<div class="row"><span>${i+1}. ${esc(r.nombre)}</span><strong>${r.xp} XP</strong></div>`).join('');
 document.getElementById('activity').innerHTML=d.events.map(e=>`<div class="row"><span>${esc(e.gameId)} · ${esc(e.eventType)}</span><strong>+${e.xpDelta||0} XP</strong></div>`).join('')||'<div class="sub">Todavia no hay actividad reciente.</div>';}
async function simulateProgress(){const id=document.getElementById('studentSelect').value;if(!id)return setStatus('Elige un alumno.');const game=(initialData.games||[]).find(g=>g.estado!=='proximamente')||{gameId:'maniacgrafia'};setStatus('Guardando progreso simulado...');try{await callServer('saveProgress',[{studentId:id,gameId:game.gameId,eventType:'demo_progress',progress:{xpDelta:80,plumasDelta:3,percentage:Math.floor(20+Math.random()*70),accuracy:Math.floor(65+Math.random()*30),attempts:10,successes:8,errors:2,streak:3},achievements:[{id:'demo_'+Date.now(),title:'Primer pulso arcade',description:'Progreso simulado desde el panel alumno',xpReward:10}],rawGameData:{source:'LenguArcade_Alumno_demo'}}]);await loadDashboard();}catch(e){setStatus('Error al guardar: '+(e.message||e));}}
boot();
</script>
</body>
</html>
